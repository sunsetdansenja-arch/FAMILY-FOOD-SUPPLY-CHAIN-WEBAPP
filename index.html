<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFood SC Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appbg: '#000000',      
                        appcard: '#1C1C1E',    
                        appyellow: '#FFCC00',  
                        appred: '#FF3B30',    
                        appgreen: '#32D74B',   
                        appblue: '#0A84FF'      
                    },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem', '5xl': '2.5rem' },
                    boxShadow: { 
                        'glow-yellow': '0 0 25px rgba(255, 204, 0, 0.25)', 
                        'glow-red': '0 0 25px rgba(255, 59, 48, 0.3)',
                        'glow-blue': '0 0 25px rgba(10, 132, 255, 0.3)'
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"San Francisco"', '"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif']
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
                        'shimmer': 'shimmer 1.5s infinite linear'
                    },
                    keyframes: {
                        fadeInUp: { '0%': { opacity: 0, transform: 'translateY(20px) scale(0.95)' }, '100%': { opacity: 1, transform: 'translateY(0) scale(1)' } },
                        shimmer: { '0%': { transform: 'translateX(-100%)' }, '100%': { transform: 'translateX(100%)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; -webkit-tap-highlight-color: transparent; }
        .hide { display: none !important; }
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        
        input, select { background-color: #2C2C2E; border: 2px solid transparent; transition: all 0.2s; color: white; width: 100%; border-radius: 1.25rem; padding: 1rem 1.25rem; outline: none; font-weight: 700;}
        input:focus, select:focus { border-color: #FFCC00; background-color: #1C1C1E; box-shadow: 0 0 15px rgba(255,204,0,0.2); }
        
        .btn-tactile { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-tactile:active { transform: scale(0.92); opacity: 0.8; }
        
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; opacity: 0; }
        .accordion-expanded { max-height: 800px; opacity: 1; border-top: 1px solid rgba(255,255,255,0.05); }
        
        #toast { transform: translateY(-150%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast-show { transform: translateY(0) !important; }
        
        .skeleton-box { position: relative; overflow: hidden; background-color: #1C1C1E; }
        .skeleton-box::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
    </style>
</head>

    <script>
        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/ff-indonesia-api";
        let activeLogData = [];
        let targetDCInput = "";

        const DC_LIST = ["BANDUNG", "BALARAJA", "BEKASI", "BOGOR", "BREBEK", "CIANJUR", "CILEUNGSI", "CIKOKOL", "CILACAP", "JEMBER", "KARAWANG", "KLATEN", "MADIUN", "MALANG", "PARUNG", "PLUMBON", "REMBANG", "SEMARANG", "SERANG", "SIDOARJO", "TEGAL", "BALI", "BANJARMASIN", "BATAM", "GORONTALO", "JAMBI", "SUKABUMI", "LAMPUNG", "LOMBOK", "LUWU", "MAKASSAR", "MANADO", "MEDAN", "PALEMBANG", "PEKANBARU", "PONTIANAK"];

        function updateMonthHeaders() {
            const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
            const d = new Date();
            document.getElementById('th-buffer').innerText = `BUFFER (${months[d.getMonth()]})`;
            document.getElementById('th-forecast').innerText = `FORECAST (${months[(d.getMonth() + 1) % 12]})`;
        }

        function getSkeletonHTML(count, isList = false) {
            if(isList) return Array(count).fill(`<div class="skeleton-box rounded-3xl h-24 w-full mb-3"></div>`).join('');
            return Array(count).fill(`<div class="skeleton-box rounded-2xl h-10 w-full mb-1.5"></div>`).join('');
        }

        function runTicker(el, endVal) {
            let startT = null, duration = 800;
            function step(t) {
                if(!startT) startT = t;
                let prog = Math.min((t - startT) / duration, 1);
                el.innerText = Math.floor(prog * endVal);
                if(prog < 1) window.requestAnimationFrame(step);
                else el.innerText = endVal;
            }
            window.requestAnimationFrame(step);
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = isError ? '❌' : '✅';
            t.className = `fixed top-5 left-1/2 -translate-x-1/2 z-[100] bg-appcard border-2 text-white px-6 py-3 rounded-full font-bold text-sm flex items-center gap-3 w-max max-w-[90%] transition-transform duration-300 ${isError ? 'border-appred shadow-glow-red' : 'border-appgreen shadow-[0_0_20px_rgba(50,215,75,0.3)]'}`;
            if(!isError && (msg.includes("Login") || msg.includes("Akses"))) t.classList.replace('border-appgreen', 'border-appyellow');
            t.classList.add('toast-show');
            setTimeout(() => t.classList.remove('toast-show'), 3000);
        }

        // ================= KONEKSI ORIGINAL =================
        async function sendApi(payload, btnElement = null, originalText = "") {
            if(btnElement) { btnElement.innerHTML = `<span class="animate-spin">⏳</span>`; btnElement.classList.add('opacity-50', 'pointer-events-none'); }
            try {
                const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                if(btnElement) { btnElement.innerHTML = originalText; btnElement.classList.remove('opacity-50', 'pointer-events-none'); }
                return Array.isArray(data) ? data[0] : data;
            } catch (e) {
                if(btnElement) { btnElement.innerHTML = originalText; btnElement.classList.remove('opacity-50', 'pointer-events-none'); }
                showToast("Koneksi Server Error", true); return null;
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const res = await sendApi({ action: "login", user_id: user, password: pass }, btn, "AUTHORIZE");
            if (res && res.status === "success") {
                showToast("Akses Diberikan!");
                document.getElementById('view-login').classList.add('hide');
                document.getElementById('view-main').classList.remove('hide');
                document.getElementById('header-username').innerText = res.user_id || user;
                updateMonthHeaders(); initDCPicker(); loadAnalytics(); 
            } else showToast(res ? res.message : "Akses Ditolak", true);
        }

        function logout() { location.reload(); }

        function initDCPicker() {
            document.getElementById('dc-grid').innerHTML = DC_LIST.map(dc => `<button type="button" onclick="selectDC('${dc}')" class="bg-[#1C1C1E] border border-white/5 text-gray-300 text-[9px] font-black py-5 rounded-[1.5rem] btn-tactile hover:border-appyellow hover:text-appyellow transition-colors uppercase tracking-wider">${dc}</button>`).join('');
        }
        function openDCModal(id) { targetDCInput = id; document.getElementById('modal-dc').classList.remove('hide'); }
        function closeDCModal() { document.getElementById('modal-dc').classList.add('hide'); }
        function selectDC(dc) { document.getElementById(targetDCInput).value = dc; closeDCModal(); }

        function switchMainTab(tabId, element) {
            ['tab-analytics', 'tab-log', 'tab-forms'].forEach(id => document.getElementById(id).classList.add('hide'));
            document.getElementById(tabId).classList.remove('hide');
            document.querySelectorAll('.nav-item').forEach(el => { if(el.classList.contains('w-[4.5rem]')) return; el.classList.replace('text-appyellow', 'text-gray-600'); el.classList.replace('text-appblue', 'text-gray-600'); });
            if(element && !element.classList.contains('w-[4.5rem]')) element.classList.replace('text-gray-600', tabId === 'tab-analytics' ? 'text-appyellow' : 'text-appblue');
        }

        function switchForm(formType) {
            ['form-po', 'form-sales', 'form-stock'].forEach(id => document.getElementById('form-' + id).classList.add('hide'));
            document.getElementById('form-' + formType).classList.remove('hide');
            ['btn-form-po', 'btn-form-sales', 'btn-form-stock'].forEach(id => document.getElementById(id).className = "flex-1 py-3 rounded-2xl text-xs font-black uppercase transition-all text-gray-500 bg-transparent");
            const btn = document.getElementById('btn-form-' + formType);
            if(formType === 'po') btn.className = "flex-1 py-3 rounded-2xl text-xs font-black uppercase transition-all bg-appyellow text-black shadow-glow-yellow";
            if(formType === 'sales') btn.className = "flex-1 py-3 rounded-2xl text-xs font-black uppercase transition-all bg-appblue text-white shadow-glow-blue";
            if(formType === 'stock') btn.className = "flex-1 py-3 rounded-2xl text-xs font-black uppercase transition-all bg-appgreen text-black shadow-[0_0_15px_rgba(50,215,75,0.3)]";
        }

        // --- 1. LOGIC 2 RUTE ANALYTICS (Tahan Banting & Anti Nyasar) ---
        async function loadAnalytics() {
            const fCont = document.getElementById('forecast-container');
            const dCont = document.getElementById('diagnosa-container');
            const btnText = document.getElementById('sync-text');
            const btnIcon = document.getElementById('sync-icon');
            
            fCont.innerHTML = getSkeletonHTML(5, false); 
            dCont.innerHTML = getSkeletonHTML(4, true);
            if(btnIcon) btnIcon.classList.add('animate-spin');

            try {
                // Eksekusi API Paralel ke n8n
                const [reqStatus, reqDiag] = await Promise.all([
                    fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "load_status" }) }),
                    fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "load_diagnose" }) })
                ]);

                let rawStatus = await reqStatus.json();
                let rawDiag = await reqDiag.json();

                // N8n 'allIncomingItems' akan mengirim Array
                const forecastRows = Array.isArray(rawStatus) ? rawStatus : [rawStatus];
                const diagRows = Array.isArray(rawDiag) ? rawDiag : [rawDiag];

                // Render Inventory (SKU)
                fCont.innerHTML = '';
                let skuCount = 0;
                forecastRows.forEach((item, idx) => {
                    const vals = Object.values(item);
                    let skuName = item.col_2 || item["Nama SKU"] || vals[1]; 
                    if(!skuName || skuName === "" || skuName.includes("Nama") || skuName.includes("col_")) return;

                    skuCount++;
                    const demand = Number(item.col_3 || item["Avg. Demand 3 Bulanan"] || vals[2] || 0);
                    const forecast = Number(item.col_4 || vals[3] || 0);
                    const buffer = Number(item.col_5 || vals[4] || 0);
                    const statusText = String(item.col_6 || item["status"] || vals[5] || "");

                    const dot = statusText.includes("CRITICAL") ? '<span class="h-2.5 w-2.5 rounded-full bg-appred shadow-[0_0_10px_#FF3B30] inline-block animate-pulse"></span>' : '<span class="h-2.5 w-2.5 rounded-full bg-appgreen shadow-[0_0_10px_#32D74B] inline-block"></span>';
                    
                    fCont.innerHTML += `
                        <div class="grid grid-cols-5 gap-1 items-center py-3 border-b border-white/5 text-[10px] text-center animate-fade-in-up" style="animation-delay: ${idx * 40}ms; opacity:0">
                            <div class="font-black text-left text-white px-1 uppercase">${skuName}</div>
                            <div class="text-gray-400 font-bold">${demand}</div>
                            <div class="text-white font-black">${forecast}</div>
                            <div class="text-white font-black">${buffer}</div>
                            <div class="flex justify-center">${dot}</div>
                        </div>`;
                });
                runTicker(document.getElementById('stat-sku'), skuCount);

                // Render Diagnose (DC)
                dCont.innerHTML = '';
                let dcCount = 0;
                diagRows.forEach((item, idx) => {
                    const vals = Object.values(item);
                    let dcName = item.col_2 || item["DC"] || vals[1];
                    if(!dcName || dcName === "" || dcName.includes("DC") || dcName.includes("col_")) return;

                    const fail = Number(item.col_3 || item["WAREHOUSE FAILURE"] || vals[2] || 0);
                    const moq = Number(item.col_5 || item["UNDER MOQ"] || vals[4] || 0);
                    const dr = String(item.col_9 || item["DIAGNOSE RESULTS (DR)"] || vals[8] || "N/A").toUpperCase();

                    const total = fail + moq;
                    if(total > 0 || dcName !== "N/A") dcCount++;
                    
                    const failPct = total > 0 ? Math.round((fail/total)*100) : 0;
                    const moqPct = total > 0 ? Math.round((moq/total)*100) : 0;

                    dCont.innerHTML += `
                        <div class="bg-appcard p-5 rounded-4xl border border-white/5 animate-fade-in-up" style="animation-delay: ${idx * 40}ms; opacity:0">
                            <h4 class="text-sm font-black text-white uppercase tracking-tighter mb-3">${dcName}</h4>
                            <div class="grid grid-cols-3 gap-1 text-[9px] font-bold bg-[#000000] p-3 rounded-3xl text-center shadow-inner">
                                <div><p class="text-gray-600 text-[8px] mb-1 uppercase tracking-widest">Failure</p><p class="text-appred font-black text-base">${failPct}%</p></div>
                                <div class="border-x border-white/10"><p class="text-gray-600 text-[8px] mb-1 uppercase tracking-widest">Under MOQ</p><p class="text-appyellow font-black text-base">${moqPct}%</p></div>
                                <div><p class="text-gray-600 text-[8px] mb-1 uppercase tracking-widest">Above MOQ</p><p class="text-appgreen font-black text-base">0%</p></div>
                            </div>
                            <p class="text-[9px] font-bold mt-4 ${dr.includes('FAILURE') ? 'text-appred' : 'text-appyellow'} tracking-widest text-center uppercase bg-white/5 py-2 rounded-xl">⚠️ ${dr}</p>
                        </div>`;
                });
                runTicker(document.getElementById('stat-dc'), dcCount);

            } catch (err) {
                showToast("Gagal Sync Data", true);
            } finally {
                if(btnIcon) btnIcon.classList.remove('animate-spin');
            }
        }

        // --- DATABASE LOG PO ---
        async function loadLogPO() {
            const cont = document.getElementById('log-container');
            const btn = document.getElementById('btn-sync-log');
            cont.innerHTML = getSkeletonHTML(5, true);
            const res = await sendApi({ action: "load_admin" }, btn, "TARIK DATABASE PO");
            if (res && res.status === "success") { activeLogData = res.data; renderLogs(activeLogData); }
        }

        function filterLogLocal() {
            const q = document.getElementById('search-po').value.toLowerCase();
            renderLogs(activeLogData.filter(i => (i.ID && i.ID.toLowerCase().includes(q)) || (i.DC && i.DC.toLowerCase().includes(q))));
        }

        function renderLogs(data) {
            const cont = document.getElementById('log-container');
            cont.innerHTML = '';
            data.forEach((item, idx) => {
                if(!item.ID || String(item["PO NKA"]).includes("BATAL")) return;
                const poQty = Number(item["TOTAL PO ctn"]) || 0;
                const salesQty = Number(item["Qty Terpenuhi (Kirim)"]) || 0;
                let borderCol = "border-appred/40", textCol = "text-appred", glow = "shadow-[0_0_15px_rgba(255,59,48,0.1)]";
                if(salesQty >= (poQty * 0.85)) { borderCol = "border-appgreen/40"; textCol = "text-appgreen"; glow = "shadow-[0_0_15px_rgba(50,215,75,0.1)]"; }
                else if(salesQty > 0) { borderCol = "border-appyellow/40"; textCol = "text-appyellow"; glow = "shadow-[0_0_15px_rgba(255,204,0,0.1)]"; }

                cont.innerHTML += `<div class="bg-appcard rounded-4xl border ${borderCol} ${glow} overflow-hidden animate-fade-in-up" style="animation-delay: ${idx * 30}ms; opacity:0">
                    <div class="p-5 flex items-center justify-between cursor-pointer btn-tactile" onclick="toggleCard('${item.ID}')">
                        <div>
                            <h4 class="font-black text-[13px] text-white uppercase tracking-tight">${item.ID}</h4>
                            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">${item.DC} • ${item["Tanggal PO"]}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] text-gray-600 uppercase font-bold tracking-widest mb-0.5 uppercase">PO / Sales</p>
                            <p class="text-sm font-black ${textCol} leading-none">${poQty} / ${salesQty}</p>
                        </div>
                    </div>
                    <div id="det-${item.ID}" class="accordion-content bg-[#000000] p-5 space-y-3">
                        <div class="space-y-2 text-[10px] font-black uppercase text-white">
                            <div class="flex items-center justify-between bg-appcard py-2.5 px-4 rounded-2xl"><span>NKA</span><div class="space-x-3"><span class="text-gray-500">P: ${item["PO NKA"] || 0}</span><span class="text-appblue">S: ${item["NKA"] || 0}</span></div></div>
                            <div class="flex items-center justify-between bg-appcard py-2.5 px-4 rounded-2xl"><span>NDLH</span><div class="space-x-3"><span class="text-gray-500">P: ${item["PO NDLH"] || 0}</span><span class="text-appblue">S: ${item["NDLH"] || 0}</span></div></div>
                            <div class="flex items-center justify-between bg-appcard py-2.5 px-4 rounded-2xl"><span>NRD</span><div class="space-x-3"><span class="text-gray-500">P: ${item["PO NRD"] || 0}</span><span class="text-appblue">S: ${item["NRD"] || 0}</span></div></div>
                            <div class="flex items-center justify-between bg-appcard py-2.5 px-4 rounded-2xl"><span>NARR</span><div class="space-x-3"><span class="text-gray-500">P: ${item["PO NARR"] || 0}</span><span class="text-appblue">S: ${item["NARR"] || 0}</span></div></div>
                        </div>
                        <div class="flex justify-between items-center pt-4 border-t border-white/5 mt-2">
                            <div><p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">GAP Kirim</p><p class="text-base font-black ${item["GAP"] == 0 ? 'text-appgreen' : 'text-appred'}">${item["GAP"] || 0} CTN</p></div>
                            <button onclick="deletePO('${item.ID}')" class="bg-appred/10 text-appred border border-appred/30 font-bold text-[10px] py-2 px-5 rounded-xl btn-tactile tracking-widest uppercase">Batal PO</button>
                        </div>
                    </div>
                </div>`;
            });
        }
        function toggleCard(id) { document.getElementById('det-' + id).classList.toggle('accordion-expanded'); }

        async function deletePO(id) {
            if(!confirm(`Batal PO ${id}?`)) return;
            const res = await sendApi({ action: "delete", id: id });
            if(res && res.status === "success") { showToast(`PO Dibatalkan`); loadLogPO(); } else showToast("Gagal", true);
        }

        async function submitAction(e, act) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            let payload = { action: act };
            const getVal = (id) => document.getElementById(id).value;
            if(act === 'insert_po') payload = { ...payload, id: getVal('po-id'), tanggal_po: getVal('po-tanggal'), tanggal_exp: getVal('po-exp'), dc: getVal('po-dc'), po_nka: getVal('po-nka'), po_ndlh: getVal('po-ndlh'), po_nrd: getVal('po-nrd'), po_narr: getVal('po-narr'), po_nkach: "0" };
            else if(act === 'insert_sales') payload = { ...payload, id: getVal('sls-id'), nka: getVal('sls-nka'), ndlh: getVal('sls-ndlh'), nrd: getVal('sls-nrd'), narr: getVal('sls-narr'), nkach: getVal('sls-nkach') };
            else payload = { ...payload, tanggal: getVal('stk-tanggal'), nka: getVal('stk-nka'), ndlh: getVal('stk-ndlh'), nrd: getVal('stk-nrd'), narr: getVal('stk-narr'), nkach: getVal('stk-nkach') };
            
            const res = await sendApi(payload, btn, btn.innerText);
            if(res && res.status === "success") { showToast("Data Tersimpan!"); e.target.reset(); } else showToast("Gagal", true);
        }
    </script>
</body>
</html>
