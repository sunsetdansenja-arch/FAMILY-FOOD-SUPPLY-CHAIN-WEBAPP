<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFood SC Control</title>
    
    <link rel="icon" type="image/png" href="./LOGO FFI.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appbg: '#000000',      
                        appcard: '#1C1C1E',    
                        appinput: '#2C2C2E',    
                        appapplered: '#FF3B30',  
                        appappleblue: '#ADD8E6', 
                        appappleorange: '#FF9500', 
                        appgreen: '#34C759',   
                        appred: '#FF3B30'      
                    },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' },
                    fontFamily: {
                        'apple': ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
                    },
                    boxShadow: { 
                        'glow-redorange': '0 0 25px rgba(255, 59, 48, 0.35)', 
                        'glow-lightblue': '0 0 15px rgba(173, 216, 230, 0.25)' 
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'shimmer': 'shimmer 1.5s infinite linear'
                    },
                    keyframes: {
                        fadeInUp: { '0%': { opacity: 0, transform: 'translateY(15px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                        shimmer: { '0%': { transform: 'translateX(-100%)' }, '100%': { transform: 'translateX(100%)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .hidden-tab { display: none !important; }
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        
        input, select { background-color: #2C2C2E; border: 1.5px solid transparent; transition: all 0.25s; color: white; width: 100%; border-radius: 1.25rem; padding: 1.1rem 1.4rem; outline: none; font-weight: 600; font-size: 0.95rem; }
        input[type="month"] { padding: 0.8rem 1.2rem; }
        input:focus, select:focus { border-color: #FF3B30; background-color: #1C1C1E; box-shadow: 0 0 15px rgba(255,59,48,0.25); }
        input::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }

        .btn-tactile { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; }
        .btn-tactile:active { transform: scale(0.96); opacity: 0.92; }
        
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.45s ease-out, opacity 0.35s; opacity: 0; }
        .accordion-expanded { max-height: 800px; opacity: 1; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 0.75rem; margin-top: 0.75rem; }
        
        #toast { transform: translateY(-150%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast-show { transform: translateY(0) !important; }
        
        .skeleton-box { position: relative; overflow: hidden; background-color: #1C1C1E; }
        .skeleton-box::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }

        /* WADAH KERTAS A4 VIRTUAL */
        .a4-wrapper { overflow-x: auto; background-color: #1C1C1E; border-radius: 1rem; padding: 10px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .a4-paper { width: 794px; min-height: 1122px; background: white; color: black; padding: 40px; font-family: Arial, sans-serif; box-sizing: border-box; position: relative; margin: 0 auto; }
    </style>
</head>
<body class="flex justify-center antialiased font-apple relative">

    <datalist id="date-recom"></datalist>
    <datalist id="recent-po-ids"></datalist>

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] bg-appcard border-2 border-appapplered text-white px-7 py-3 rounded-full shadow-glow-redorange font-extrabold text-sm flex items-center gap-3 w-max max-w-[90%] pointer-events-none">
        <span id="toast-icon">✅</span>
        <span id="toast-msg">Success</span>
    </div>

    <div id="modal-dc" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[100] hidden-tab flex flex-col px-4 pt-12 pb-6">
        <div class="w-full max-w-4xl mx-auto flex flex-col h-full">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-white font-black text-2xl italic tracking-tight text-appapplered px-2">Pilih Nama DC</h3>
                <button type="button" onclick="closeDCModal()" class="text-gray-400 bg-white/10 p-3 rounded-full btn-tactile hover:text-white">✕</button>
            </div>
            <div class="grid grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-3.5 overflow-y-auto pb-10 content-start flex-1 px-2" id="dc-grid"></div>
        </div>
    </div>

    <div id="pdf-container"></div>

    <div id="app" class="w-full max-w-md md:max-w-5xl bg-appbg min-h-screen relative overflow-x-hidden flex flex-col shadow-2xl mx-auto md:border-x border-white/5">
        
        <div id="view-login" class="flex flex-col h-screen p-9 justify-center items-center relative z-40 bg-[#000000]">
            <div class="w-full max-w-sm md:max-w-md space-y-12">
                <div class="text-center space-y-4">
                    <img src="./LOGO FFI.png" alt="Family Food Logo" onerror="this.src='https://via.placeholder.com/150/FF3B30/FFFFFF?text=FFI'" class="w-36 md:w-48 h-auto mx-auto mb-8 drop-shadow-[0_0_20px_rgba(255,59,48,0.4)] animate-fade-in-up">
                    <p class="text-[11px] md:text-xs text-gray-500 uppercase tracking-[0.35em] font-extrabold">Secure Access Center</p>
                </div>
                <form id="form-login" onsubmit="handleLogin(event)" class="space-y-5">
                    <input type="text" id="login-user" placeholder="USER ID" required class="text-center font-black uppercase tracking-widest bg-appinput border-white/5 md:py-4">
                    <input type="password" id="login-pass" placeholder="PASSWORD" required class="text-center font-black tracking-widest bg-appinput border-white/5 md:py-4">
                    <button type="submit" id="btn-login" class="w-full bg-appapplered text-white font-extrabold py-4.5 md:py-5 rounded-2xl shadow-glow-redorange mt-6 btn-tactile text-sm md:text-base">MASUK SISTEM</button>
                </form>
            </div>
        </div>

        <div id="view-main" class="hidden-tab flex-col h-full">
            
            <div class="px-6 py-4 md:px-10 md:py-6 sticky top-0 bg-[#000000]/92 backdrop-blur-xl z-20 flex justify-between items-center border-b border-white/7">
                <div class="flex items-center gap-4">
                    <img src="./LOGO FFI.png" alt="Family Food Logo" onerror="this.src='https://via.placeholder.com/50/FF3B30/FFFFFF?text=FFI'" class="h-9 md:h-12 w-auto object-contain drop-shadow-[0_0_10px_rgba(255,59,48,0.25)]">
                    <h2 class="text-lg md:text-2xl font-black text-white tracking-tighter italic leading-none uppercase">Family<span class="text-appappleorange">Food</span></h2>
                </div>
                <div class="flex items-center gap-2 bg-white/10 px-4 py-2 md:px-5 md:py-2.5 rounded-full">
                    <span class="w-2.5 h-2.5 rounded-full bg-appgreen animate-pulse shadow-[0_0_8px_#34C759]"></span>
                    <p id="header-username" class="text-[10px] md:text-xs text-gray-300 uppercase font-extrabold tracking-widest">USER</p>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto pb-36 md:pb-40">
                
                <div id="tab-analytics" class="p-6 md:p-10 space-y-6 md:space-y-8 animate-fade-in-up">
                    <div class="flex flex-col md:flex-row gap-4 md:gap-6">
                        <div class="flex-1 bg-appcard border border-white/7 p-6 rounded-4xl flex flex-col justify-between shadow-glow-lightblue transition-all hover:shadow-[0_0_20px_rgba(173,216,230,0.3)]">
                            <p class="text-[10px] md:text-xs
