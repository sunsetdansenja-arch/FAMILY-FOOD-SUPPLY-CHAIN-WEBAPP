<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFood SC Tracker (Owner Final)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appbg: '#121212',      
                        appcard: '#1E1E1E',    
                        appyellow: '#F4D160',  
                        appgreen: '#4ADE80',   
                        appred: '#FB7185'
                    },
                    borderRadius: { '3xl': '1.25rem', '4xl': '2rem' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: ui-sans-serif, system-ui, sans-serif; }
        .hide { display: none !important; }
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        .tab-btn { transition: all 0.2s ease; font-weight: 600; }
        .tab-active { background-color: #F4D160; color: #000; }
        .tab-inactive { background-color: #1E1E1E; color: #A1A1AA; }
        .status-glow-red { box-shadow: 0 0 20px rgba(251, 113, 133, 0.15); border: 1px solid rgba(251, 113, 133, 0.4); }
        .status-glow-green { border: 1px solid rgba(74, 222, 128, 0.2); }
    </style>
</head>
<body class="flex justify-center antialiased">

    <div id="app" class="w-full max-w-md bg-appbg min-h-screen relative overflow-x-hidden flex flex-col">
        
        <div class="p-6 pb-2 sticky top-0 bg-appbg/90 backdrop-blur-xl z-20">
            <div class="flex justify-between items-center mb-1">
                <h2 class="text-2xl font-black text-appyellow tracking-tighter italic">FAMILYFOOD</h2>
                <div class="flex gap-2">
                     <span class="bg-appgreen/10 text-appgreen px-2 py-0.5 rounded text-[8px] font-bold border border-appgreen/20 uppercase">Online</span>
                </div>
            </div>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Supply Chain Control Center</p>
        </div>

        <div class="flex px-6 py-4 gap-2 sticky top-[75px] bg-appbg/90 backdrop-blur-xl z-20">
            <button onclick="switchTab('tab-owner')" id="btn-tab-owner" class="tab-btn tab-active flex-1 py-3.5 rounded-2xl text-[10px] uppercase tracking-widest">Owner Analytics</button>
            <button onclick="switchTab('tab-log')" id="btn-tab-log" class="tab-btn tab-inactive flex-1 py-3.5 rounded-2xl text-[10px] uppercase tracking-widest">Log PO</button>
        </div>

        <div class="p-6 pt-2 pb-32 space-y-10">
            
            <div id="tab-owner" class="space-y-10">
                <button onclick="loadOwnerData()" id="btn-load-owner" class="w-full bg-white text-black font-black py-4.5 rounded-3xl shadow-2xl flex justify-center items-center gap-3 active:scale-95 transition-all">
                    <span class="text-lg">🔄</span> SYNC DATA ANALYTICS
                </button>

                <div class="space-y-5">
                    <div class="flex justify-between items-end px-1">
                        <h4 class="text-[11px] font-black text-white uppercase tracking-[0.2em]">Inventory Health (Hybrid)</h4>
                        <span id="stat-sku" class="text-[9px] text-gray-500 font-bold">0 SKU</span>
                    </div>
                    <div id="forecast-container" class="space-y-5">
                        <div class="py-20 text-center opacity-30 italic text-xs">Menunggu Sinkronisasi...</div>
                    </div>
                </div>

                <div class="space-y-5">
                    <div class="flex justify-between items-end px-1">
                        <h4 class="text-[11px] font-black text-white uppercase tracking-[0.2em]">DC Diagnose (Percentage)</h4>
                        <span id="stat-dc" class="text-[9px] text-gray-500 font-bold">0 DC</span>
                    </div>
                    <div id="diagnosa-container" class="bg-appcard rounded-[2.5rem] p-3 border border-white/5 divide-y divide-white/5">
                        </div>
                </div>
            </div>

            <div id="tab-log" class="hide space-y-4">
                <button onclick="loadLogData()" id="btn-load-log" class="w-full bg-appyellow text-black font-black py-4 rounded-3xl shadow-lg flex justify-center items-center gap-2">
                    📦 TARIK LOG PO TERBARU
                </button>
                <div id="log-container" class="space-y-3"></div>
            </div>

        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/ff-indonesia-api";

        async function sendApi(payload) {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST', mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (e) { return { status: "error" }; }
        }

        function switchTab(tabId) {
            ['tab-log', 'tab-owner'].forEach(id => {
                document.getElementById(id).classList.add('hide');
                document.getElementById('btn-' + id).classList.replace('tab-active', 'tab-inactive');
            });
            document.getElementById(tabId).classList.remove('hide');
            document.getElementById('btn-' + tabId).classList.replace('tab-inactive', 'tab-active');
        }

        async function loadOwnerData() {
            const fContainer = document.getElementById('forecast-container');
            const dContainer = document.getElementById('diagnosa-container');
            const btn = document.getElementById('btn-load-owner');
            
            btn.innerHTML = `<span class="animate-spin">⏳</span> ANALYZING SHEET...`;
            btn.classList.add('opacity-50', 'pointer-events-none');

            let raw = await sendApi({ action: "load_owner" });
            let res = Array.isArray(raw) ? raw[0] : raw;

            btn.innerHTML = `<span class="text-lg">🔄</span> SYNC DATA ANALYTICS`;
            btn.classList.remove('opacity-50', 'pointer-events-none');

            if (res && res.status === "success") {
                document.getElementById('stat-sku').innerText = `${res.total_sku} SKU AKTIF`;
                document.getElementById('stat-dc').innerText = `${res.total_dc} DC TERPANTAU`;

                // Render Hybrid Forecast
                fContainer.innerHTML = '';
                res.data.forecast.forEach(item => {
                    const isCritical = String(item.status).includes("CRITICAL");
                    const card = document.createElement('div');
                    card.className = `bg-appcard p-6 rounded-[2.5rem] ${isCritical ? 'status-glow-red' : 'status-glow-green'}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-6">
                            <div class="max-w-[60%]">
                                <h3 class="text-2xl font-black text-white tracking-tighter leading-none mb-2">${item.sku_name}</h3>
                                <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${isCritical ? 'bg-appred text-black' : 'bg-appgreen text-black'} tracking-widest italic">${item.status}</span>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mb-1">Forecast PO</p>
                                <div class="text-2xl font-black text-white leading-none">${item.forecast_po}<span class="text-[10px] text-gray-600 ml-1">CTN</span></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-black/30 p-4 rounded-3xl border border-white/5">
                                <p class="text-[8px] text-gray-600 font-bold uppercase mb-1">Avg Demand</p>
                                <p class="text-sm font-black text-gray-300">${item.avg_demand || '0'}</p>
                            </div>
                            <div class="bg-black/30 p-4 rounded-3xl border border-white/5">
                                <p class="text-[8px] text-gray-600 font-bold uppercase mb-1">Stock Buffer</p>
                                <p class="text-sm font-black text-gray-300">${item.buffer || '0'}</p>
                            </div>
                        </div>
                        <div class="space-y-2 pt-4 border-t border-white/5">
                             <div class="flex justify-between text-[9px] font-black uppercase tracking-tighter">
                                <span class="${isCritical ? 'text-appred' : 'text-gray-500'}">${isCritical ? '⚠️ UNDER STOCK' : 'SAFE'}</span>
                                <span class="text-white">${isCritical ? item.under_stock : item.over_stock} CTN</span>
                             </div>
                             <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                                <div class="h-full ${isCritical ? 'bg-appred shadow-[0_0_10px_rgba(251,113,133,0.5)]' : 'bg-appgreen'}" style="width: ${isCritical ? '100%' : '40%'}"></div>
                             </div>
                        </div>`;
                    fContainer.appendChild(card);
                });

                // Render Percentage Diagnose
                dContainer.innerHTML = '';
                res.data.diagnosa.forEach(item => {
                    const failCount = Number(item.warehouse_failure);
                    const moqCount = Number(item.under_moq);
                    const total = failCount + moqCount;
                    
                    // Logic Persentase (hanya front-end)
                    const failPct = total > 0 ? Math.round((failCount / total) * 100) : 0;
                    const moqPct = total > 0 ? Math.round((moqCount / total) * 100) : 0;

                    const itemEl = document.createElement('div');
                    itemEl.className = "flex items-center gap-4 p-5";
                    itemEl.innerHTML = `
                        <div class="shrink-0 w-12 text-center">
                            <p class="text-xl font-black text-white">${total}</p>
                            <p class="text-[7px] text-gray-600 font-bold uppercase">Issues</p>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="text-[11px] font-black text-white uppercase truncate mb-1.5 tracking-tight">${item.dc_name}</h4>
                            <div class="flex gap-1 h-1.5 rounded-full overflow-hidden bg-white/5">
                                <div class="bg-appred h-full" style="width: ${failPct}%"></div>
                                <div class="bg-appyellow h-full" style="width: ${moqPct}%"></div>
                            </div>
                        </div>
                        <div class="text-right shrink-0">
                             <p class="text-[10px] font-black text-appred leading-none">${failPct}%</p>
                             <p class="text-[10px] font-black text-appyellow mt-1 leading-none">${moqPct}%</p>
                        </div>`;
                    dContainer.appendChild(itemEl);
                });
            }
        }

        async function loadLogData() {
            const container = document.getElementById('log-container');
            const btn = document.getElementById('btn-load-log');
            btn.innerHTML = `<span>⏳</span> FETCHING LOGS...`;
            container.innerHTML = '';
            let raw = await sendApi({ action: "load_admin" });
            let res = Array.isArray(raw) ? raw[0] : raw;
            btn.innerHTML = `📦 TARIK LOG PO TERBARU`;
            if (res.status === "success" && res.data) {
                res.data.forEach(item => {
                    if(!item.ID || String(item["PO NKA"]).includes("BATAL")) return;
                    const card = document.createElement('div');
                    card.className = "bg-appcard p-4 rounded-3xl border-l-4 border-l-appyellow flex justify-between items-center";
                    card.innerHTML = `
                        <div>
                            <p class="text-[10px] font-black text-white uppercase tracking-tight">${item.ID}</p>
                            <p class="text-[8px] text-gray-500 font-bold uppercase mt-0.5">${item.DC || "-"}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-black text-appyellow">${item["TOTAL PO ctn"] || 0} CTN</span>
                        </div>`;
                    container.appendChild(card);
                });
            }
        }
    </script>
</body>
</html>
