<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFood SC Tracker (Owner Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appbg: '#1C1C1E',      
                        appcard: '#2C2C2E',    
                        appyellow: '#F4D160',  
                        appgreen: '#D4E08B',   
                        appred: '#E86A58'      
                    },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: ui-sans-serif, system-ui, sans-serif; }
        .hide { display: none !important; }
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        .tab-btn { transition: all 0.2s ease; white-space: nowrap; }
        .tab-active { background-color: #F4D160; color: #000; font-weight: 600; }
        .tab-inactive { background-color: #2C2C2E; color: #A1A1AA; }
    </style>
</head>
<body class="flex justify-center antialiased">

    <div id="app" class="w-full max-w-md bg-appbg min-h-screen relative overflow-x-hidden shadow-2xl flex flex-col">
        
        <div id="view-admin" class="flex-col h-full">
            <div class="p-6 pb-2 flex justify-between items-center sticky top-0 bg-appbg z-10 border-b border-white/10">
                <div>
                    <h2 class="text-2xl font-bold text-appyellow">FamilyFood</h2>
                    <p class="text-xs text-white opacity-70">Dimas Santosa | Owner Dashboard</p>
                </div>
            </div>

            <div class="flex overflow-x-auto px-6 py-4 gap-3 sticky top-[75px] bg-appbg z-10 border-b border-white/5">
                <button onclick="switchTab('tab-owner')" id="btn-tab-owner" class="tab-btn tab-active px-5 py-2.5 rounded-full text-sm">Owner Analytics</button>
                <button onclick="switchTab('tab-log')" id="btn-tab-log" class="tab-btn tab-inactive px-5 py-2.5 rounded-full text-sm">LOG PO</button>
            </div>

            <div class="p-6 overflow-y-auto pb-24">
                
                <div id="tab-owner" class="space-y-6">
                    <button onclick="loadOwnerData()" id="btn-load-owner" class="w-full bg-appgreen text-black font-bold rounded-2xl px-5 py-4 shadow-lg flex justify-center items-center gap-2">
                        <span class="text-xl">📊</span> Sinkronisasi Data Forecast
                    </button>

                    <div id="owner-summary" class="grid grid-cols-2 gap-3 hide">
                        <div class="bg-appcard p-4 rounded-3xl border border-white/5">
                            <p class="text-[10px] text-gray-500 uppercase font-bold">Total SKU</p>
                            <p id="stat-sku" class="text-2xl font-bold text-white">0</p>
                        </div>
                        <div class="bg-appcard p-4 rounded-3xl border border-white/5">
                            <p class="text-[10px] text-gray-500 uppercase font-bold">DC Aktif</p>
                            <p id="stat-dc" class="text-2xl font-bold text-appgreen">0</p>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <h4 class="text-sm font-bold text-gray-400 px-1">Inventory & Forecast</h4>
                        <div id="forecast-container" class="space-y-4">
                             <p class="text-center text-gray-500 text-xs py-10">Tekan tombol di atas untuk sinkronisasi.</p>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <h4 class="text-sm font-bold text-gray-400 px-1">Diagnosa Kendala DC</h4>
                        <div id="diagnosa-container" class="space-y-4"></div>
                    </div>
                </div>

                <div id="tab-log" class="hide space-y-4">
                    <button onclick="loadLogData()" id="btn-load-log" class="w-full bg-appyellow text-black font-bold rounded-2xl px-5 py-4 shadow-lg flex justify-center items-center gap-2">
                        <span class="text-xl">🗃️</span> Tarik Data LOG PO
                    </button>
                    <div id="log-container" class="mt-6 space-y-4"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/ff-indonesia-api";

        async function sendApi(payload) {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) {
                return { status: "error", message: "Koneksi gagal." };
            }
        }

        function switchTab(tabId) {
            ['tab-log', 'tab-owner'].forEach(id => {
                document.getElementById(id).classList.add('hide');
                document.getElementById('btn-' + id).classList.replace('tab-active', 'tab-inactive');
            });
            document.getElementById(tabId).classList.remove('hide');
            document.getElementById('btn-' + tabId).classList.replace('tab-inactive', 'tab-active');
        }

        async function loadOwnerData() {
            const fContainer = document.getElementById('forecast-container');
            const dContainer = document.getElementById('diagnosa-container');
            const btn = document.getElementById('btn-load-owner');
            
            btn.innerHTML = `<span class="animate-spin text-xl">⏳</span> Sinkronisasi...`;
            btn.classList.add('opacity-70', 'pointer-events-none');

            const res = await sendApi({ action: "load_owner" });
            
            btn.innerHTML = `<span class="text-xl">📊</span> Sinkronisasi Data Forecast`;
            btn.classList.remove('opacity-70', 'pointer-events-none');

            if (res.status === "success" && res.data) {
                document.getElementById('owner-summary').classList.remove('hide');
                document.getElementById('stat-sku').innerText = res.total_sku;
                document.getElementById('stat-dc').innerText = res.total_dc;

                // Render Forecast
                fContainer.innerHTML = '';
                if(res.data.forecast.length === 0) {
                    fContainer.innerHTML = `<p class="text-center text-appred text-xs py-5">⚠️ Data Forecast tidak ditemukan di database.</p>`;
                } else {
                    res.data.forecast.forEach(item => {
                        const isSafe = item.status.includes("SAFE");
                        const card = document.createElement('div');
                        card.className = `bg-appcard rounded-3xl p-5 border ${isSafe ? 'border-appgreen/20' : 'border-appred/20'} shadow-lg`;
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div><h3 class="font-bold text-white text-lg">${item.sku_name}</h3><span class="px-3 py-1 rounded-full text-[10px] font-bold ${isSafe ? 'bg-appgreen/10 text-appgreen' : 'bg-appred/10 text-appred'}">${item.status}</span></div>
                                <div class="text-right"><p class="text-[10px] text-gray-500 uppercase font-bold">Forecast</p><p class="text-lg font-bold text-white">${item.forecast_po} <span class="text-xs font-normal opacity-50">Ctn</span></p></div>
                            </div>
                            <div class="grid grid-cols-3 gap-2 pt-3 border-t border-white/5">
                                <div><p class="text-[9px] text-gray-500 uppercase">Demand</p><p class="text-xs font-bold text-gray-300">${item.avg_demand}</p></div>
                                <div><p class="text-[9px] text-gray-500 uppercase">Buffer</p><p class="text-xs font-bold text-gray-300">${item.buffer}</p></div>
                                <div class="text-right"><p class="text-[9px] text-gray-500 uppercase">Under</p><p class="text-xs font-bold text-appred">${item.under_stock}</p></div>
                            </div>`;
                        fContainer.appendChild(card);
                    });
                }

                // Render Diagnosa
                dContainer.innerHTML = '';
                if(res.data.diagnosa.length === 0) {
                    dContainer.innerHTML = `<p class="text-center text-gray-500 text-xs py-5">Tidak ada diagnosa DC.</p>`;
                } else {
                    res.data.diagnosa.forEach(item => {
                        const isMoq = item.diagnose_result.includes("MOQ");
                        const card = document.createElement('div');
                        card.className = "bg-[#1C1C1E] rounded-2xl p-4 border border-white/5 flex items-center gap-4";
                        card.innerHTML = `
                            <div class="h-10 w-10 rounded-full bg-appcard flex items-center justify-center text-lg">${isMoq ? '📦' : '🏗️'}</div>
                            <div class="flex-1"><h4 class="font-bold text-white text-xs uppercase">${item.dc_name}</h4><p class="text-[10px] text-appyellow font-medium">${item.diagnose_result}</p></div>
                            <div class="text-right border-l border-white/10 pl-4"><p class="text-[8px] text-gray-500 uppercase font-bold">Fail</p><p class="text-xs font-bold text-appred">${item.warehouse_failure + item.under_moq}</p></div>`;
                        dContainer.appendChild(card);
                    });
                }
            }
        }
    </script>
</body>
</html>
