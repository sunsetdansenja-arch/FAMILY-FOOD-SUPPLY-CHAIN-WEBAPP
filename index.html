<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFood SC Tracker (Testing Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appbg: '#1C1C1E',      
                        appcard: '#2C2C2E',    
                        appyellow: '#F4D160',  
                        appgreen: '#D4E08B',   
                        appred: '#E86A58'      
                    },
                    borderRadius: {
                        '3xl': '1.5rem',
                        '4xl': '2rem'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: ui-sans-serif, system-ui, sans-serif; }
        .hide { display: none !important; }
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        input:focus, select:focus { outline: none; border-color: #F4D160; }
        .tab-btn { transition: all 0.2s ease; white-space: nowrap; }
        .tab-active { background-color: #F4D160; color: #000; font-weight: 600; }
        .tab-inactive { background-color: #2C2C2E; color: #A1A1AA; }
    </style>
</head>
<body class="flex justify-center antialiased">

    <div id="app" class="w-full max-w-md bg-appbg min-h-screen relative overflow-x-hidden shadow-2xl flex flex-col">
        
        <div id="view-login" class="hide flex flex-col h-screen p-8 justify-center"></div>

        <div id="view-admin" class="flex-col h-full">
            <div class="p-6 pb-2 flex justify-between items-center sticky top-0 bg-appbg z-10 border-b border-white/10">
                <div>
                    <h2 class="text-2xl font-bold text-appyellow">Admin Panel</h2>
                    <p class="text-xs text-white opacity-70">Fokus Testing: LOG PO</p>
                </div>
            </div>

            <div class="flex overflow-x-auto px-6 py-4 gap-3 sticky top-[75px] bg-appbg z-10 border-b border-white/5">
                <button onclick="switchTab('tab-po')" id="btn-tab-po" class="tab-btn tab-inactive px-5 py-2.5 rounded-full text-sm">Input PO</button>
                <button onclick="switchTab('tab-sales')" id="btn-tab-sales" class="tab-btn tab-inactive px-5 py-2.5 rounded-full text-sm">Sales</button>
                <button onclick="switchTab('tab-stock')" id="btn-tab-stock" class="tab-btn tab-inactive px-5 py-2.5 rounded-full text-sm">Stock</button>
                <button onclick="switchTab('tab-log')" id="btn-tab-log" class="tab-btn tab-active px-5 py-2.5 rounded-full text-sm">LOG PO</button>
            </div>

            <div class="p-6 overflow-y-auto pb-24">
                
                <form id="tab-po" class="hide space-y-4">
                    <p class="text-center text-gray-500 text-sm mt-10">Buka Tab LOG PO untuk testing saat ini.</p>
                </form>
                <form id="tab-sales" class="hide space-y-4"></form>
                <form id="tab-stock" class="hide space-y-4"></form>

                <div id="tab-log" class="space-y-4">
                    <div class="flex gap-2 mb-2">
                        <select id="filter-month" class="w-1/2 bg-appcard text-white rounded-2xl px-4 py-3 text-sm appearance-none">
                            <option value="">Semua Bulan</option>
                            <option value="1">Januari</option>
                            <option value="2">Februari</option>
                            <option value="3">Maret</option>
                            <option value="4">April</option>
                        </select>
                        <select id="filter-year" class="w-1/2 bg-appcard text-white rounded-2xl px-4 py-3 text-sm appearance-none">
                            <option value="">Semua Tahun</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                        </select>
                    </div>
                    
                    <div class="flex gap-2">
                        <input type="text" id="filter-id" placeholder="Cari ID PO spesifik..." class="w-full bg-appcard text-white rounded-2xl px-4 py-3 text-sm">
                    </div>

                    <button onclick="loadLogData()" id="btn-load-log" class="w-full bg-appyellow text-black font-bold rounded-2xl px-5 py-4 mt-2 shadow-lg hover:bg-yellow-400 transition flex justify-center items-center gap-2">
                        <span class="text-xl">🗃️</span> Tarik Data LOG PO
                    </button>
                    
                    <div id="log-container" class="mt-6 space-y-4">
                        <div class="border border-dashed border-gray-600 rounded-3xl p-8 text-center">
                            <p class="text-gray-500 text-sm">Tekan tombol kuning di atas untuk menarik data dari Database Google Sheets.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/ff-indonesia-api";

        // Auto buka tab LOG PO saat web dimuat
        document.addEventListener('DOMContentLoaded', () => {
            switchTab('tab-log');
        });

        // CORE API FUNCTION
        async function sendApi(payload) {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error("API Error:", error);
                return { status: "error", message: "Koneksi ke server n8n gagal." };
            }
        }

        // TAB SWITCHER
        function switchTab(tabId) {
            ['tab-po', 'tab-sales', 'tab-stock', 'tab-log'].forEach(id => {
                document.getElementById(id).classList.add('hide');
                document.getElementById('btn-' + id).classList.replace('tab-active', 'tab-inactive');
            });
            document.getElementById(tabId).classList.remove('hide');
            document.getElementById('btn-' + tabId).classList.replace('tab-inactive', 'tab-active');
        }

        // FUNGSI UTAMA: LOAD LOG ADMIN
        async function loadLogData() {
            const container = document.getElementById('log-container');
            const btn = document.getElementById('btn-load-log');
            
            // Ubah state tombol saat loading
            btn.innerHTML = `<span class="animate-spin text-xl">⏳</span> Sedang Menarik Data...`;
            btn.classList.add('opacity-70', 'pointer-events-none');
            container.innerHTML = '';

            const payload = {
                action: "load_admin",
                search_id: document.getElementById('filter-id').value,
                filter_month: document.getElementById('filter-month').value,
                filter_year: document.getElementById('filter-year').value
            };

            const res = await sendApi(payload);
            
            // Kembalikan state tombol
            btn.innerHTML = `<span class="text-xl">🗃️</span> Tarik Data LOG PO`;
            btn.classList.remove('opacity-70', 'pointer-events-none');

            if (res.status === "success" && res.data && res.data.length > 0) {
                // Info jumlah data
                const infoText = document.createElement('p');
                infoText.className = "text-xs text-appgreen text-right mb-2";
                infoText.innerText = `Menampilkan ${res.total_data} PO terbaru`;
                container.appendChild(infoText);

                res.data.forEach(item => {
                    // Abaikan baris kosong atau PO yang batal
                    if(!item.ID || item["PO NKA"] === "[BATAL]") return;

                    const card = document.createElement('div');
                    card.className = "bg-appcard rounded-3xl p-5 relative shadow-lg border border-white/5";
                    card.innerHTML = `
                        <div class="pr-12">
                            <h3 class="font-bold text-lg text-white mb-1">${item.ID}</h3>
                            <p class="text-[11px] text-gray-400 mb-3">PO: ${item["Tanggal PO"] || "-"} | EXP: ${item["Tanggal EXP"] || "-"} | DC: ${item.DC || "-"}</p>
                            
                            <div class="grid grid-cols-2 gap-2 bg-[#1C1C1E] p-3 rounded-2xl">
                                <div>
                                    <p class="text-[9px] text-gray-500 uppercase font-bold">Total PO</p>
                                    <p class="text-sm font-bold text-gray-300 mt-1">${item["TOTAL PO ctn"] || 0} Ctn</p>
                                </div>
                                <div class="border-l border-white/5 pl-2">
                                    <p class="text-[9px] text-appyellow uppercase font-bold">Terkirim</p>
                                    <p class="text-sm font-bold text-appyellow mt-1">${item["Qty Terpenuhi (Kirim)"] || 0} Ctn</p>
                                </div>
                            </div>
                        </div>
                        <button onclick="deleteRow('${item.ID}')" title="Batalkan PO" class="absolute top-5 right-4 h-10 w-10 bg-appred/10 text-appred rounded-full flex justify-center items-center text-lg hover:bg-appred hover:text-white transition">
                            ✕
                        </button>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = `
                    <div class="border border-dashed border-appred/50 rounded-3xl p-8 text-center bg-appred/10">
                        <p class="text-appred font-bold mb-1">Data Tidak Ditemukan</p>
                        <p class="text-xs text-gray-400">Pastikan ID atau filter bulan/tahun sudah benar.</p>
                    </div>`;
            }
        }

        // FUNGSI: DELETE/CANCEL PO
        async function deleteRow(id) {
            if(!confirm(`PERINGATAN: Anda yakin ingin membatalkan PO dengan ID: ${id}?`)) return;
            
            const btn = document.getElementById('btn-load-log');
            btn.innerHTML = `<span class="animate-pulse text-xl">🗑️</span> Membatalkan...`;
            
            const res = await sendApi({ action: "delete", id: id });
            alert(res.message);
            if(res.status === "success") loadLogData(); // Refresh list jika berhasil
        }
    </script>
</body>
</html>
