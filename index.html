<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFood SC Control</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appbg: '#121212',       /* Solid Dark Background */
                        appcard: '#1E1E1E',     /* Solid Card Background */
                        apporange: '#FFDAC1',   /* Pastel Peach / Orange */
                        appblue: '#C7CEEA',     /* Pastel Blue */
                        appgreen: '#E2F0CB',    /* Pastel Green */
                        appred: '#FFB7B2'       /* Pastel Red */
                    },
                    borderRadius: { '3xl': '1.25rem', '4xl': '1.75rem' },
                    fontFamily: {
                        /* Apple OS Font Stack */
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.4s ease-out forwards',
                        'shimmer': 'shimmer 1.5s infinite linear'
                    },
                    keyframes: {
                        fadeInUp: { 
                            '0%': { opacity: 0, transform: 'translateY(15px)' }, 
                            '100%': { opacity: 1, transform: 'translateY(0)' } 
                        },
                        shimmer: { 
                            '0%': { transform: 'translateX(-100%)' }, 
                            '100%': { transform: 'translateX(100%)' } 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Base Apple Style Settings */
        body { background-color: #121212; color: #fff; -webkit-tap-highlight-color: transparent; }
        .hide { display: none !important; }
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        
        /* Solid Inputs - No Blur, No Glow */
        input, select { background-color: #2C2C2E; border: 2px solid transparent; transition: all 0.2s; color: white; width: 100%; border-radius: 1rem; padding: 0.85rem 1rem; outline: none; font-weight: 600;}
        input:focus, select:focus { border-color: #FFDAC1; background-color: #1A1A1A; }
        input::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; cursor: pointer; }

        /* Tactile Feedback */
        .btn-tactile { transition: all 0.1s ease-in-out; cursor: pointer; }
        .btn-tactile:active { transform: scale(0.96); opacity: 0.8; }
        
        /* Accordion Solid */
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, opacity 0.2s; opacity: 0; }
        .accordion-expanded { max-height: 800px; opacity: 1; border-top: 1px solid #333333; margin-top: 0.75rem; padding-top: 0.75rem; }
        
        /* Toast Notification */
        #toast { transform: translateY(-150%); transition: transform 0.3s ease-out; }
        .toast-show { transform: translateY(0) !important; }

        /* Skeleton Solid */
        .skeleton-box { position: relative; overflow: hidden; background-color: #2A2A2C; border-radius: 1rem; }
        .skeleton-box::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); animation: shimmer 1.5s infinite; }
    </style>
</head>
<body class="flex justify-center antialiased">

    <datalist id="date-recom"></datalist>
    <datalist id="recent-po-ids"></datalist>

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] bg-appcard border-2 text-white px-6 py-3 rounded-full font-bold text-sm flex items-center gap-3 w-max max-w-[90%] pointer-events-none">
        <span id="toast-icon">✅</span>
        <span id="toast-msg">Success</span>
    </div>

    <div id="modal-dc" class="fixed inset-0 bg-[#121212] z-[100] hide flex flex-col px-4 pt-12 pb-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-white font-black text-xl tracking-tight text-apporange">Pilih Nama DC</h3>
            <button onclick="closeDCModal()" class="text-gray-400 bg-[#2C2C2E] p-3 rounded-full btn-tactile"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="grid grid-cols-3 gap-3 overflow-y-auto pb-10 content-start flex-1" id="dc-grid"></div>
    </div>

    <div id="app" class="w-full max-w-md bg-appbg min-h-screen relative overflow-x-hidden flex flex-col">
        
        <div id="view-login" class="flex flex-col h-screen p-8 justify-center items-center relative z-40 bg-appbg">
            <div class="w-full max-w-sm space-y-8 bg-appcard p-8 rounded-4xl border border-[#333333]">
                <div class="text-center space-y-1">
                    <h1 class="text-3xl font-black text-white tracking-tight">Family<span class="text-appblue">Food</span></h1>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold mt-1">Control Center</p>
                </div>
                <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4 pt-4">
                    <div><input type="text" id="login-user" placeholder="USER ID" required class="text-center font-bold uppercase tracking-widest bg-[#121212]"></div>
                    <div><input type="password" id="login-pass" placeholder="PASSWORD" required class="text-center font-bold tracking-widest bg-[#121212]"></div>
                    <button type="submit" id="btn-login" class="w-full bg-apporange text-black font-black py-4 rounded-2xl btn-tactile mt-2 uppercase tracking-widest">Login Sistem</button>
                </form>
            </div>
        </div>

        <div id="view-main" class="hide flex-col h-full">
            
            <div class="px-6 py-4 sticky top-0 bg-appbg z-20 flex justify-between items-center border-b border-[#333333]">
                <div>
                    <h2 class="text-xl font-black text-white tracking-tight leading-none">Family<span class="text-apporange">Food</span></h2>
                    <div class="flex items-center gap-1.5 mt-1">
                        <span class="w-2 h-2 rounded-full bg-appgreen"></span>
                        <p id="header-username" class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">USER LOGGED IN</p>
                    </div>
                </div>
                <button onclick="logout()" class="bg-[#1E1E1E] border border-[#333333] px-4 py-2 rounded-xl text-gray-300 btn-tactile text-[10px] font-bold uppercase">Logout</button>
            </div>

            <div class="flex-1 overflow-y-auto pb-32">
                
                <div id="tab-analytics" class="p-6 space-y-8">
                    
                    <button onclick="loadAnalytics()" id="btn-sync-analytics" class="w-full bg-white text-black font-black py-4 rounded-2xl btn-tactile flex justify-center items-center gap-2 text-sm uppercase tracking-widest border border-gray-300">
                        <i class="fa-solid fa-rotate-right" id="sync-icon"></i> Sync Data
                    </button>

                    <div class="space-y-3">
                        <div class="flex justify-between items-end border-b border-[#333333] pb-2">
                            <h4 class="text-xs font-black text-apporange uppercase tracking-widest">Inventory Health</h4>
                            <span id="stat-sku" class="text-[10px] text-gray-400 font-bold bg-[#1E1E1E] px-2 py-0.5 rounded">0 SKU</span>
                        </div>
                        <div class="p-1">
                            <div class="grid grid-cols-5 gap-1 px-1 py-2 text-[8px] text-gray-500 font-bold uppercase tracking-widest border-b border-[#333333] text-center">
                                <div class="text-left">NAMA SKU</div>
                                <div>AVG 3 BLN</div>
                                <div id="th-forecast" class="text-appblue">FORECAST</div>
                                <div id="th-buffer" class="text-apporange">BUFFER</div>
                                <div>STATUS</div>
                            </div>
                            <div id="forecast-container" class="px-1 pb-2">
                                <div class="py-10 text-center text-gray-600 text-xs font-bold">Tekan Sync Data...</div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3 pt-2">
                        <div class="flex justify-between items-end border-b border-[#333333] pb-2">
                            <h4 class="text-xs font-black text-appblue uppercase tracking-widest">DC Diagnose</h4>
                            <span id="stat-dc" class="text-[10px] text-gray-400 font-bold bg-[#1E1E1E] px-2 py-0.5 rounded">0 DC</span>
                        </div>
                        <div id="diagnosa-container" class="space-y-3"></div>
                    </div>
                </div>

                <div id="tab-log" class="hide p-6 space-y-6">
                    <div class="sticky top-[68px] bg-appbg z-10 pt-2 pb-4 border-b border-[#333333]">
                        <div class="flex gap-2">
                            <input type="text" id="search-po" placeholder="Cari ID / DC..." class="text-sm bg-appcard border border-[#333333] flex-1" onkeyup="filterLogLocal()">
                            <button onclick="loadLogPO()" id="btn-sync-log" class="bg-appblue text-black font-black px-6 rounded-2xl btn-tactile flex justify-center items-center">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                        </div>
                    </div>
                    <div id="log-container" class="space-y-3"></div>
                </div>

                <div id="tab-forms" class="hide p-6 space-y-6">
                    <div class="flex bg-appcard p-1.5 rounded-2xl border border-[#333333]">
                        <button onclick="switchForm('po')" id="btn-form-po" class="flex-1 py-2.5 rounded-xl text-xs font-bold uppercase transition-all bg-apporange text-black">New PO</button>
                        <button onclick="switchForm('sales')" id="btn-form-sales" class="flex-1 py-2.5 rounded-xl text-xs font-bold uppercase transition-all text-gray-400">Sales</button>
                        <button onclick="switchForm('stock')" id="btn-form-stock" class="flex-1 py-2.5 rounded-xl text-xs font-bold uppercase transition-all text-gray-400">Stock</button>
                    </div>

                    <form id="form-po" onsubmit="submitAction(event, 'insert_po')" class="space-y-5 bg-appcard p-5 rounded-3xl border border-[#333333]">
                        <div class="space-y-3">
                            <input type="text" id="po-id" placeholder="ID PO (CTH: JKT01...)" required class="uppercase bg-[#121212]">
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" id="po-tanggal" list="date-recom" autocomplete="off" placeholder="Tgl PO" required class="bg-[#121212]">
                                <input type="text" id="po-exp" list="date-recom" autocomplete="off" placeholder="Tgl EXP" required class="bg-[#121212]">
                            </div>
                            <div class="relative cursor-pointer btn-tactile" onclick="openDCModal('po-dc')">
                                <input type="text" id="po-dc" placeholder="PILIH DC" required readonly class="pointer-events-none uppercase bg-[#121212] text-appblue">
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-appblue"><i class="fa-solid fa-chevron-down"></i></div>
                            </div>
                        </div>
                        <div class="pt-4 border-t border-[#333333]">
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3">Kuantitas PO SKU (Ctn)</p>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NKA</label><input type="number" id="po-nka" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NDLH</label><input type="number" id="po-ndlh" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NRD</label><input type="number" id="po-nrd" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NARR</label><input type="number" id="po-narr" value="0" required class="bg-transparent border-none mt-1"></div>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-apporange text-black font-black py-4 rounded-2xl btn-tactile tracking-widest">SUBMIT PO</button>
                    </form>

                    <form id="form-sales" onsubmit="submitAction(event, 'insert_sales')" class="hide space-y-5 bg-appcard p-5 rounded-3xl border border-[#333333]">
                        <div class="space-y-3">
                            <input type="text" id="sls-id" list="recent-po-ids" autocomplete="off" placeholder="ID PO (Pilih / Ketik)" required class="uppercase bg-[#121212] text-appblue">
                        </div>
                        <div class="pt-4 border-t border-[#333333]">
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3">Realisasi / Sales (Ctn)</p>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NKA</label><input type="number" id="sls-nka" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NDLH</label><input type="number" id="sls-ndlh" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NRD</label><input type="number" id="sls-nrd" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NARR</label><input type="number" id="sls-narr" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="col-span-2 bg-[#121212] p-2 rounded-2xl border border-appblue"><label class="text-[9px] text-appblue ml-2 font-bold">NKACH</label><input type="number" id="sls-nkach" value="0" required class="bg-transparent border-none mt-1 text-appblue"></div>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-appblue text-black font-black py-4 rounded-2xl btn-tactile tracking-widest">UPDATE SALES</button>
                    </form>

                    <form id="form-stock" onsubmit="submitAction(event, 'insert_stock')" class="hide space-y-5 bg-appcard p-5 rounded-3xl border border-[#333333]">
                        <input type="text" id="stk-tanggal" list="date-recom" autocomplete="off" placeholder="Tanggal (DD/MM/YYYY)" required class="bg-[#121212]">
                        <div class="pt-2 border-t border-[#333333]">
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3 mt-2">Update Fisik Stock (Ctn)</p>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NKA</label><input type="number" id="stk-nka" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NDLH</label><input type="number" id="stk-ndlh" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NRD</label><input type="number" id="stk-nrd" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-[#121212] p-2 rounded-2xl border border-[#333333]"><label class="text-[9px] text-gray-500 ml-2 font-bold">NARR</label><input type="number" id="stk-narr" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="col-span-2 bg-[#121212] p-2 rounded-2xl border border-appgreen"><label class="text-[9px] text-appgreen ml-2 font-bold">NKACH</label><input type="number" id="stk-nkach" value="0" required class="bg-transparent border-none mt-1 text-appgreen"></div>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-appgreen text-black font-black py-4 rounded-2xl btn-tactile tracking-widest">UPDATE STOCK</button>
                    </form>
                </div>
            </div>

            <div class="fixed bottom-0 w-full max-w-md bg-appbg border-t border-[#333333] pt-3 pb-6 px-6 flex justify-between items-center z-50">
                <button onclick="switchMainTab('tab-analytics', this)" class="nav-item flex-1 flex flex-col items-center gap-1.5 text-apporange btn-tactile">
                    <i class="fa-solid fa-chart-simple text-xl"></i>
                    <span class="text-[9px] font-bold uppercase tracking-widest">Analytic</span>
                </button>
                <div class="relative -top-6">
                    <button onclick="switchMainTab('tab-forms', this)" class="nav-item bg-white text-black h-14 w-14 rounded-full flex justify-center items-center btn-tactile border-[5px] border-[#121212]">
                        <i class="fa-solid fa-plus text-xl"></i>
                    </button>
                </div>
                <button onclick="switchMainTab('tab-log', this)" class="nav-item flex-1 flex flex-col items-center gap-1.5 text-gray-500 btn-tactile">
                    <i class="fa-solid fa-server text-xl"></i>
                    <span class="text-[9px] font-bold uppercase tracking-widest">Database</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/ff-indonesia-api";
        let activeLogData = [];
        let targetDCInput = "";

        const DC_LIST = ["BANDUNG", "BALARAJA", "BEKASI", "BOGOR", "BREBEK", "CIANJUR", "CILEUNGSI", "CIKOKOL", "CILACAP", "JEMBER", "KARAWANG", "KLATEN", "MADIUN", "MALANG", "PARUNG", "PLUMBON", "REMBANG", "SEMARANG", "SERANG", "SIDOARJO", "TEGAL", "BALI", "BANJARMASIN", "BATAM", "GORONTALO", "JAMBI", "SUKABUMI", "LAMPUNG", "LOMBOK", "LUWU", "MAKASSAR", "MANADO", "MEDAN", "PALEMBANG", "PEKANBARU", "PONTIANAK"];

        // --- FITUR AUTO TANGGAL (HARI INI S/D H-3) ---
        function initDateRecommendations() {
            const dl = document.getElementById('date-recom');
            if(!dl) return;
            dl.innerHTML = '';
            const today = new Date();
            for(let i=0; i<=3; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dd = String(d.getDate()).padStart(2, '0');
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const yyyy = d.getFullYear();
                dl.innerHTML += `<option value="${dd}/${mm}/${yyyy}">`;
            }
        }

        function updateMonthHeaders() {
            const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
            const d = new Date();
            document.getElementById('th-buffer').innerText = `BUFF (${months[d.getMonth()]})`;
            document.getElementById('th-forecast').innerText = `FCST (${months[(d.getMonth() + 1) % 12]})`;
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = isError ? '❌' : '✅';
            t.className = `fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full font-bold text-sm flex items-center gap-3 w-max max-w-[90%] transition-transform duration-300 border-2 ${isError ? 'bg-[#121212] border-appred text-appred' : 'bg-[#121212] border-appblue text-appblue'}`;
            if(!isError && (msg.includes("Login") || msg.includes("Akses"))) t.classList.replace('border-appblue', 'border-apporange');
            if(!isError && (msg.includes("Tersimpan"))) t.classList.replace('border-appblue', 'border-appgreen');
            t.classList.add('toast-show');
            setTimeout(() => t.classList.remove('toast-show'), 3000);
        }

        // ================= KONEKSI API N8N (MESIN STABIL) =================
        async function sendApi(payload, btnElement = null, originalText = "") {
            if(btnElement) { btnElement.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`; btnElement.classList.add('opacity-50', 'pointer-events-none'); }
            try {
                const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                if(btnElement) { btnElement.innerHTML = originalText; btnElement.classList.remove('opacity-50', 'pointer-events-none'); }
                return Array.isArray(data) ? data[0] : data;
            } catch (e) {
                if(btnElement) { btnElement.innerHTML = originalText; btnElement.classList.remove('opacity-50', 'pointer-events-none'); }
                showToast("Koneksi Server Error", true); return null;
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            
            const res = await sendApi({ action: "login", user_id: user, password: pass }, btn, "Login Sistem");
            if (res && res.status === "success") {
                showToast("Akses Diberikan!");
                document.getElementById('view-login').classList.add('hide');
                document.getElementById('view-main').classList.remove('hide');
                document.getElementById('header-username').innerText = res.user_id || user;
                
                initDateRecommendations(); 
                initDCPicker();
                updateMonthHeaders();
                loadAnalytics(); 
            } else {
                showToast(res ? res.message : "Akses Ditolak", true);
            }
        }

        function logout() { location.reload(); }

        // --- NAVIGATION & MODALS ---
        function initDCPicker() {
            document.getElementById('dc-grid').innerHTML = DC_LIST.map(dc => `<button type="button" onclick="selectDC('${dc}')" class="bg-[#121212] border border-[#333333] text-white text-[10px] font-bold py-3 rounded-xl btn-tactile hover:border-apporange transition-colors uppercase tracking-wider">${dc}</button>`).join('');
        }
        function openDCModal(inputId) { targetDCInput = inputId; document.getElementById('modal-dc').classList.remove('hide'); }
        function closeDCModal() { document.getElementById('modal-dc').classList.add('hide'); }
        function selectDC(dcName) { document.getElementById(targetDCInput).value = dcName; closeDCModal(); }

        function switchMainTab(tabId, element) {
            ['tab-analytics', 'tab-log', 'tab-forms'].forEach(id => document.getElementById(id).classList.add('hide'));
            document.getElementById(tabId).classList.remove('hide');
            
            document.querySelectorAll('.nav-item').forEach(el => {
                if(el.classList.contains('w-14')) return; 
                el.classList.replace('text-apporange', 'text-gray-500');
                el.classList.replace('text-appblue', 'text-gray-500');
            });
            if(element && !element.classList.contains('w-14')) {
                element.classList.replace('text-gray-500', tabId === 'tab-analytics' ? 'text-apporange' : 'text-appblue');
            }
        }

        function switchForm(formType) {
            ['form-po', 'form-sales', 'form-stock'].forEach(id => document.getElementById(id).classList.add('hide'));
            document.getElementById('form-' + formType).classList.remove('hide');
            
            ['btn-form-po', 'btn-form-sales', 'btn-form-stock'].forEach(id => {
                document.getElementById(id).className = "flex-1 py-2.5 rounded-xl text-xs font-bold uppercase transition-all text-gray-400 bg-transparent"; 
            });
            
            const activeBtn = document.getElementById('btn-form-' + formType);
            if(formType === 'po') activeBtn.className = "flex-1 py-2.5 rounded-xl text-xs font-bold uppercase transition-all bg-apporange text-black";
            if(formType === 'sales') activeBtn.className = "flex-1 py-2.5 rounded-xl text-xs font-bold uppercase transition-all bg-appblue text-black";
            if(formType === 'stock') activeBtn.className = "flex-1 py-2.5 rounded-xl text-xs font-bold uppercase transition-all bg-appgreen text-black";
        }

        // --- 1. ANALYTICS LOGIC (2 ACTION PARALEL, PEMBULATAN) ---
        async function loadAnalytics() {
            const fCont = document.getElementById('forecast-container');
            const dCont = document.getElementById('diagnosa-container');
            const btn = document.getElementById('btn-sync-analytics');
            const origText = btn.innerHTML;
            
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> MEMPROSES...`;
            btn.classList.add('opacity-50', 'pointer-events-none');

            try {
                // Tembak 2 rute (Owner & Diagnose) secara bersamaan agar tabel tidak tertukar
                const [reqOwner, reqDiag] = await Promise.all([
                    fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "load_owner" }) }),
                    fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "load_diagnose" }) })
                ]);

                const rawOwner = await reqOwner.json();
                const rawDiag = await reqDiag.json();

                const forecastRows = Array.isArray(rawOwner) ? rawOwner : [rawOwner];
                const diagRows = Array.isArray(rawDiag) ? rawDiag : [rawDiag];

                // RENDER INVENTORY (Dengan Filter dan Pembulatan Desimal)
                fCont.innerHTML = '';
                let validForecast = forecastRows.filter(item => {
                    let sku = String(item.col_2 || item["Nama SKU"] || Object.values(item.json || item)[1] || "").toUpperCase();
                    return sku && sku !== "N/A" && sku !== "NAMA SKU" && !sku.includes("COL_");
                });

                validForecast.forEach((item, idx) => {
                    const row = item.json ? item.json : item;
                    const vals = Object.values(row);
                    const skuName = row.col_2 || row["Nama SKU"] || vals[1];
                    const isCrit = String(row.col_6 || row["STATUS"] || vals[5]).includes("CRITICAL");
                    
                    // PEMBULATAN MATEMATIS
                    const demandBulat = Math.round(Number(row.col_3 || row["Avg. Demand 3 Bulanan"] || vals[2] || 0));
                    const forecastBulat = Math.round(Number(row.col_4 || row["FORECAST PO"] || vals[3] || 0));
                    const bufferBulat = Math.round(Number(row.col_5 || row["BUFFER"] || vals[4] || 0));
                    
                    const dot = isCrit ? '<span class="h-2 w-2 rounded-full bg-appred inline-block"></span>' : '<span class="h-2 w-2 rounded-full bg-appgreen inline-block"></span>';

                    // Pemasangan truncate & min-w-0 agar tidak keluar frame
                    fCont.innerHTML += `
                        <div class="grid grid-cols-5 gap-1 items-center py-2.5 border-b border-[#333333] text-[10px] text-center animate-fade-in-up" style="animation-delay: ${idx * 40}ms; opacity: 0;">
                            <div class="font-bold text-left text-white px-1 uppercase truncate min-w-0">${skuName}</div>
                            <div class="text-gray-400 font-bold">${demandBulat}</div>
                            <div class="text-white font-bold">${forecastBulat}</div>
                            <div class="text-white font-bold">${bufferBulat}</div>
                            <div class="flex justify-center items-center">${dot}</div>
                        </div>`;
                });
                document.getElementById('stat-sku').innerText = validForecast.length + " SKU";

                // RENDER DC DIAGNOSE 
                dCont.innerHTML = '';
                let validDiagnosa = diagRows.filter(item => {
                    let dc = String(item.col_2 || item["DC"] || Object.values(item.json || item)[1] || "").toUpperCase();
                    return dc && dc !== "N/A" && dc !== "DC" && !dc.includes("COL_");
                });

                validDiagnosa.forEach((item, idx) => {
                    const row = item.json ? item.json : item;
                    const vals = Object.values(row);
                    const dcName = row.col_2 || row["DC"] || vals[1];

                    const failCount = Number(row.col_3 || row["WAREHOUSE FAILURE"] || vals[2] || 0);
                    const moqCount = Number(row.col_5 || row["UNDER MOQ"] || vals[4] || 0);
                    
                    const total = failCount + moqCount;
                    const failPct = total > 0 ? Math.round((failCount / total) * 100) : 0;
                    const moqPct = total > 0 ? Math.round((moqCount / total) * 100) : 0;
                    const resStr = String(row.col_9 || row["DIAGNOSE RESULTS (DR)"] || vals[8] || "N/A").toUpperCase();

                    // Pemasangan truncate & penyesuaian font
                    dCont.innerHTML += `
                        <div class="bg-appcard p-4 rounded-[1.5rem] border border-[#333333] mb-3 animate-fade-in-up" style="animation-delay: ${idx * 40}ms; opacity: 0;">
                            <div class="flex justify-between items-center mb-3">
                                <h4 class="text-xs font-black text-white uppercase tracking-tight truncate w-32">${dcName}</h4>
                                <p class="text-[8px] font-bold ${resStr.includes('FAILURE') ? 'text-appred' : 'text-apporange'} tracking-widest bg-[#121212] px-2 py-1 rounded-md border border-[#333333]">⚠️ ${resStr}</p>
                            </div>
                            <div class="grid grid-cols-3 gap-2 text-center bg-[#121212] p-2.5 rounded-xl border border-[#333333]">
                                <div class="border-r border-[#333333]">
                                    <p class="text-[7px] text-gray-500 font-bold uppercase tracking-widest mb-1">Failure</p>
                                    <p class="text-xs font-black text-appred">${failPct}%</p>
                                </div>
                                <div class="border-r border-[#333333]">
                                    <p class="text-[7px] text-gray-500 font-bold uppercase tracking-widest mb-1">Under MOQ</p>
                                    <p class="text-xs font-black text-apporange">${moqPct}%</p>
                                </div>
                                <div>
                                    <p class="text-[7px] text-gray-500 font-bold uppercase tracking-widest mb-1">Above MOQ</p>
                                    <p class="text-xs font-black text-appgreen">0%</p>
                                </div>
                            </div>
                        </div>`;
                });
                document.getElementById('stat-dc').innerText = validDiagnosa.length + " DC";

            } catch (err) {
                showToast("Gagal Sync Data", true);
            } finally {
                btn.innerHTML = origText;
                btn.classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        // --- 2. LOG PO DATABASE (DENGAN REKOMENDASI 10 ID TERAKHIR) ---
        async function loadLogPO() {
            const btn = document.getElementById('btn-sync-log');
            const cont = document.getElementById('log-container');
            const dl = document.getElementById('recent-po-ids'); // Target Datalist Sales
            
            cont.innerHTML = `<p class="text-center text-xs text-gray-500">Memuat data...</p>`;
            
            const res = await sendApi({ action: "load_admin" }, btn, `<i class="fa-solid fa-rotate-right"></i>`);
            if (res && res.status === "success") {
                activeLogData = res.data;
                
                // Isi Dropdown Rekomendasi 10 ID Terakhir untuk Form Sales
                dl.innerHTML = '';
                let countID = 0;
                activeLogData.forEach(item => {
                    if(item.ID && countID < 10 && !String(item["PO NKA"]).includes("BATAL")) {
                        dl.innerHTML += `<option value="${item.ID}">`;
                        countID++;
                    }
                });

                renderLogs(activeLogData);
            }
        }

        function filterLogLocal() {
            const q = document.getElementById('search-po').value.toLowerCase();
            const filtered = activeLogData.filter(i => (i.ID && i.ID.toLowerCase().includes(q)) || (i.DC && i.DC.toLowerCase().includes(q)));
            renderLogs(filtered);
        }

        function renderLogs(data) {
            const cont = document.getElementById('log-container');
            cont.innerHTML = '';
            data.forEach((item, idx) => {
                if(!item.ID || String(item["PO NKA"]).includes("BATAL")) return;
                
                const poQty = Number(item["TOTAL PO ctn"]) || 0;
                const salesQty = Number(item["Qty Terpenuhi (Kirim)"]) || 0;
                
                let borderCol = "border-[#333333]", textCol = "text-appred", icon = "fa-circle-xmark", iconCol="text-appred";
                if (salesQty >= (poQty * 0.85)) { 
                    borderCol = "border-appgreen"; textCol = "text-appgreen"; icon = "fa-circle-check"; iconCol="text-appgreen";
                } else if (salesQty > 0) { 
                    borderCol = "border-apporange"; textCol = "text-apporange"; icon = "fa-clock-rotate-left"; iconCol="text-apporange";
                }

                // Baris NKACH telah dimasukkan
                cont.innerHTML += `
                    <div class="bg-appcard rounded-3xl border ${borderCol} overflow-hidden transition-all duration-300 animate-fade-in-up" style="animation-delay: ${idx * 30}ms; opacity: 0;">
                        <div class="p-4 flex items-center justify-between cursor-pointer btn-tactile" onclick="toggleCard('${item.ID}')">
                            <div class="flex items-center gap-3 w-2/3">
                                <i class="fa-solid ${icon} ${iconCol} text-lg"></i>
                                <div class="min-w-0"> <h4 class="font-black text-[13px] text-white uppercase tracking-tight truncate">${item.ID}</h4>
                                    <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest mt-0.5 truncate">${item.DC} • ${item["Tanggal PO"]}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-[7px] text-gray-500 uppercase font-bold tracking-widest mb-0.5">PO/SALES</p>
                                <p class="text-xs font-black ${textCol} leading-none">${poQty} <span class="text-gray-500 mx-0.5">/</span> ${salesQty}</p>
                            </div>
                        </div>
                        
                        <div id="det-${item.ID}" class="accordion-content bg-[#121212] p-4">
                            <div class="p-4 pt-1 space-y-3 mt-1">
                                <div class="flex text-[8px] text-gray-500 font-bold uppercase tracking-widest px-2 mb-1">
                                    <span class="w-12">SKU</span>
                                    <span class="flex-1 text-center">PO</span>
                                    <span class="flex-1 text-center">SALES</span>
                                </div>
                                <div class="space-y-1.5 text-[9px] font-bold uppercase text-white">
                                    <div class="flex items-center bg-[#1E1E1E] py-2 px-3 rounded-xl border border-[#333333]"><span class="w-12 text-gray-400">NKA</span><span class="flex-1 text-center text-white">${item["PO NKA"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NKA"] || 0}</span></div>
                                    <div class="flex items-center bg-[#1E1E1E] py-2 px-3 rounded-xl border border-[#333333]"><span class="w-12 text-gray-400">NDLH</span><span class="flex-1 text-center text-white">${item["PO NDLH"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NDLH"] || 0}</span></div>
                                    <div class="flex items-center bg-[#1E1E1E] py-2 px-3 rounded-xl border border-[#333333]"><span class="w-12 text-gray-400">NRD</span><span class="flex-1 text-center text-white">${item["PO NRD"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NRD"] || 0}</span></div>
                                    <div class="flex items-center bg-[#1E1E1E] py-2 px-3 rounded-xl border border-[#333333]"><span class="w-12 text-gray-400">NARR</span><span class="flex-1 text-center text-white">${item["PO NARR"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NARR"] || 0}</span></div>
                                    <div class="flex items-center bg-[#1E1E1E] py-2 px-3 rounded-xl border border-appblue"><span class="w-12 text-gray-400">NKACH</span><span class="flex-1 text-center text-white">${item["PO NKACH"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NKACH"] || 0}</span></div>
                                </div>
                                <div class="flex justify-between items-center border-t border-[#333333] pt-4 mt-2">
                                    <div>
                                        <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mb-0.5">GAP Pengiriman</p>
                                        <p class="text-sm font-black ${item["GAP"] == 0 ? 'text-appgreen' : 'text-appred'}">${item["GAP"] || 0} CTN</p>
                                    </div>
                                    <button onclick="deletePO('${item.ID}')" class="border border-appred text-appred font-bold text-[9px] py-2 px-3 rounded-xl btn-tactile hover:bg-appred hover:text-black uppercase tracking-widest">
                                        BATAL PO
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function toggleCard(id) {
            const el = document.getElementById('det-' + id);
            el.classList.toggle('accordion-expanded');
        }

        async function deletePO(id) {
            if(!confirm(`PERINGATAN: Batalkan PO ${id}?`)) return;
            const res = await sendApi({ action: "delete", id: id });
            if(res && res.status === "success") {
                showToast(`PO ${id} Dibatalkan`, false);
                loadLogPO();
            } else showToast("Gagal membatalkan PO", true);
        }

        // --- 3. FORMS INPUT ---
        async function submitAction(e, actionType) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            let payload = { action: actionType };

            if(actionType === 'insert_po') {
                payload = { ...payload, 
                    id: document.getElementById('po-id').value.toUpperCase(),
                    tanggal_po: document.getElementById('po-tanggal').value,
                    tanggal_exp: document.getElementById('po-exp').value,
                    dc: document.getElementById('po-dc').value.toUpperCase(),
                    po_nka: document.getElementById('po-nka').value,
                    po_ndlh: document.getElementById('po-ndlh').value,
                    po_nrd: document.getElementById('po-nrd').value,
                    po_narr: document.getElementById('po-narr').value,
                    po_nkach: "0" 
                };
            } 
            else if(actionType === 'insert_sales') {
                payload = { ...payload, 
                    id: document.getElementById('sls-id').value.toUpperCase(),
                    nka: document.getElementById('sls-nka').value,
                    ndlh: document.getElementById('sls-ndlh').value,
                    nrd: document.getElementById('sls-nrd').value,
                    narr: document.getElementById('sls-narr').value,
                    nkach: document.getElementById('sls-nkach').value
                };
            }
            else if(actionType === 'insert_stock') {
                payload = { ...payload, 
                    tanggal: document.getElementById('stk-tanggal').value,
                    nka: document.getElementById('stk-nka').value,
                    ndlh: document.getElementById('stk-ndlh').value,
                    nrd: document.getElementById('stk-nrd').value,
                    narr: document.getElementById('stk-narr').value,
                    nkach: document.getElementById('stk-nkach').value
                };
            }

            const res = await sendApi(payload, btn, btn.innerText);
            if(res && res.status === "success") {
                showToast(res.message || "Data Tersimpan!", false);
                e.target.reset();
            } else {
                showToast("Gagal menyimpan data", true);
            }
        }
    </script>
</body>
</html>
