<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFood SC Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appbg: '#0A0A0A',      
                        appcard: '#1C1C1E',    
                        apporange: '#FF851B',  
                        appblue: '#2B65F6',    
                        appgreen: '#34C759',   
                        appred: '#FF3B30'      
                    },
                    borderRadius: { '3xl': '1.25rem', '4xl': '2rem' },
                    boxShadow: { 
                        'glow-orange': '0 0 20px rgba(255, 133, 27, 0.3)', 
                        'glow-blue': '0 0 20px rgba(43, 101, 246, 0.3)' 
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.4s ease-out forwards',
                        'shimmer': 'shimmer 1.5s infinite linear'
                    },
                    keyframes: {
                        fadeInUp: { '0%': { opacity: 0, transform: 'translateY(20px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                        shimmer: { '0%': { transform: 'translateX(-100%)' }, '100%': { transform: 'translateX(100%)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0A0A0A; color: #fff; font-family: ui-sans-serif, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide { display: none !important; }
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        
        input, select { background-color: #2C2C2E; border: 2px solid transparent; transition: all 0.2s; color: white; width: 100%; border-radius: 1rem; padding: 1rem 1.25rem; outline: none; font-weight: bold;}
        input:focus, select:focus { border-color: #FF851B; background-color: #1C1C1E; box-shadow: 0 0 15px rgba(255,133,27,0.2); }
        input::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }

        .btn-tactile { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-tactile:active { transform: scale(0.95); opacity: 0.9; }
        
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out, opacity 0.3s; opacity: 0; }
        .accordion-expanded { max-height: 800px; opacity: 1; border-top: 1px solid rgba(255,255,255,0.05); }
        
        #toast { transform: translateY(-150%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast-show { transform: translateY(0) !important; }
        
        .skeleton-box { position: relative; overflow: hidden; background-color: #1C1C1E; }
        .skeleton-box::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
    </style>
</head>

    <script>
        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/ff-indonesia-api";
        let activeLogData = [];
        let targetDCInput = "";

        const DC_LIST = ["BANDUNG", "BALARAJA", "BEKASI", "BOGOR", "BREBEK", "CIANJUR", "CILEUNGSI", "CIKOKOL", "CILACAP", "JEMBER", "KARAWANG", "KLATEN", "MADIUN", "MALANG", "PARUNG", "PLUMBON", "REMBANG", "SEMARANG", "SERANG", "SIDOARJO", "TEGAL", "BALI", "BANJARMASIN", "BATAM", "GORONTALO", "JAMBI", "SUKABUMI", "LAMPUNG", "LOMBOK", "LUWU", "MAKASSAR", "MANADO", "MEDAN", "PALEMBANG", "PEKANBARU", "PONTIANAK"];

        function initDateRecommendations() {
            const dl = document.getElementById('date-recom');
            if(!dl) return;
            dl.innerHTML = '';
            const today = new Date();
            for(let i=0; i<=3; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dd = String(d.getDate()).padStart(2, '0');
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const yyyy = d.getFullYear();
                dl.innerHTML += `<option value="${dd}/${mm}/${yyyy}">`;
            }
        }

        function updateMonthHeaders() {
            const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
            const d = new Date();
            document.getElementById('th-buffer').innerHTML = `BUFFER<br>(${months[d.getMonth()]})`;
            document.getElementById('th-forecast').innerHTML = `FORECAST<br>(${months[(d.getMonth() + 1) % 12]})`;
        }

        function getSkeletonHTML(count, isList = false) {
            if(isList) return Array(count).fill(`<div class="skeleton-box rounded-[1.5rem] h-20 w-full mb-3"></div>`).join('');
            return Array(count).fill(`<div class="skeleton-box rounded-xl h-10 w-full mb-1"></div>`).join('');
        }

        function runTicker(el, endVal) {
            if(!el) return;
            let startT = null, duration = 800;
            function step(t) {
                if(!startT) startT = t;
                let prog = Math.min((t - startT) / duration, 1);
                el.innerText = Math.floor(prog * endVal);
                if(prog < 1) window.requestAnimationFrame(step);
                else el.innerText = endVal;
            }
            window.requestAnimationFrame(step);
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            if(!t) return;
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = isError ? '❌' : '✅';
            t.className = `fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full font-black text-sm flex items-center gap-3 w-max max-w-[90%] transition-transform duration-300 border-2 ${isError ? 'bg-[#3A0000] border-appred text-appred shadow-[0_0_20px_rgba(255,59,48,0.4)]' : 'bg-appcard border-appgreen text-white shadow-[0_0_20px_rgba(52,199,89,0.3)]'}`;
            if(!isError && (msg.includes("Login") || msg.includes("Akses"))) t.classList.replace('border-appgreen', 'border-apporange');
            t.classList.add('toast-show');
            setTimeout(() => t.classList.remove('toast-show'), 3000);
        }

        // ================= KONEKSI API N8N =================
        async function sendApi(payload, btnElement = null, originalText = "") {
            if(btnElement) { btnElement.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`; btnElement.classList.add('opacity-50', 'pointer-events-none'); }
            try {
                const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const textData = await res.text(); // Parse sebagai text dulu agar tidak crash jika n8n return string
                let data;
                try { data = JSON.parse(textData); } catch(err) { data = textData; } // Coba jadikan JSON
                
                if(btnElement) { btnElement.innerHTML = originalText; btnElement.classList.remove('opacity-50', 'pointer-events-none'); }
                return Array.isArray(data) ? data[0] : data;
            } catch (e) {
                if(btnElement) { btnElement.innerHTML = originalText; btnElement.classList.remove('opacity-50', 'pointer-events-none'); }
                showToast("Koneksi Server Error", true); return null;
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            
            const res = await sendApi({ action: "login", user_id: user, password: pass }, btn, "MASUK SISTEM");
            if (res && res.status === "success") {
                showToast("Akses Diberikan!");
                document.getElementById('view-login').classList.add('hide');
                document.getElementById('view-main').classList.remove('hide');
                document.getElementById('header-username').innerText = res.user_id || user;
                
                initDateRecommendations();
                updateMonthHeaders();
                initDCPicker();
                loadAnalytics(); 
            } else showToast(res ? res.message : "Akses Ditolak", true);
        }

        function logout() { location.reload(); }

        // --- NAVIGATION & MODALS ---
        function initDCPicker() {
            document.getElementById('dc-grid').innerHTML = DC_LIST.map(dc => `<button type="button" onclick="selectDC('${dc}')" class="bg-appcard border border-white/5 text-gray-300 text-[10px] font-black py-4 rounded-2xl btn-tactile hover:border-apporange hover:text-apporange transition-colors uppercase tracking-wider">${dc}</button>`).join('');
        }
        function openDCModal(id) { targetDCInput = id; document.getElementById('modal-dc').classList.remove('hide'); }
        function closeDCModal() { document.getElementById('modal-dc').classList.add('hide'); }
        function selectDC(dc) { document.getElementById(targetDCInput).value = dc; closeDCModal(); }

        function switchMainTab(tabId, element) {
            try {
                ['tab-analytics', 'tab-log', 'tab-forms'].forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.classList.add('hide');
                });
                const target = document.getElementById(tabId);
                if(target) target.classList.remove('hide');

                document.querySelectorAll('.nav-item').forEach(el => {
                    if(el.classList.contains('w-16')) return; 
                    el.classList.replace('text-apporange', 'text-gray-600'); el.classList.replace('text-appblue', 'text-gray-600');
                });
                if(element && !element.classList.contains('w-16')) element.classList.replace('text-gray-600', tabId === 'tab-analytics' ? 'text-apporange' : 'text-appblue');
            } catch(e) { console.error("Error Tab Switch:", e); }
        }

        function switchForm(formType) {
            try {
                ['form-po', 'form-sales', 'form-stock'].forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.classList.add('hide');
                });
                
                const targetForm = document.getElementById('form-' + formType);
                if(targetForm) targetForm.classList.remove('hide');
                
                ['btn-form-po', 'btn-form-sales', 'btn-form-stock'].forEach(id => {
                    const btn = document.getElementById(id);
                    if(btn) btn.className = "flex-1 py-2.5 rounded-xl text-xs font-black uppercase transition-all text-gray-500 bg-transparent";
                });
                
                const activeBtn = document.getElementById('btn-form-' + formType);
                if(activeBtn) {
                    if(formType === 'po') activeBtn.className = "flex-1 py-2.5 rounded-xl text-xs font-black uppercase transition-all bg-apporange text-black shadow-glow-orange";
                    if(formType === 'sales') activeBtn.className = "flex-1 py-2.5 rounded-xl text-xs font-black uppercase transition-all bg-appblue text-white shadow-glow-blue";
                    if(formType === 'stock') activeBtn.className = "flex-1 py-2.5 rounded-xl text-xs font-black uppercase transition-all bg-appgreen text-black shadow-[0_0_15px_rgba(52,199,89,0.3)]";
                }
            } catch(e) { console.error("Error Form Switch:", e); }
        }

        // --- 1. ANALYTICS (2 API PARALEL, ERROR SAFE, ROUNDING) ---
        async function loadAnalytics() {
            const fCont = document.getElementById('forecast-container');
            const dCont = document.getElementById('diagnosa-container');
            const btn = document.getElementById('btn-sync-analytics');
            const origText = btn.innerHTML;
            
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> MEMPROSES...`;
            btn.classList.add('opacity-50', 'pointer-events-none');
            
            if(fCont) fCont.innerHTML = getSkeletonHTML(5, false); 
            if(dCont) dCont.innerHTML = getSkeletonHTML(4, true);

            try {
                const [reqOwner, reqDiag] = await Promise.allSettled([
                    fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "load_owner" }) }),
                    fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "LOG_DIAGNOSE" }) }) // Sesuai N8N Anda
                ]);

                // RENDER INVENTORY
                if(fCont) fCont.innerHTML = '';
                let skuCount = 0;
                
                if(reqOwner.status === 'fulfilled' && reqOwner.value.ok) {
                    const textOwner = await reqOwner.value.text();
                    let rawOwner;
                    try { rawOwner = JSON.parse(textOwner); } catch(e) { rawOwner = []; }
                    
                    const forecastRows = Array.isArray(rawOwner) ? rawOwner : [rawOwner];
                    
                    forecastRows.forEach((item, idx) => {
                        const row = item.json ? item.json : item; 
                        const vals = Object.values(row);
                        
                        let skuName = row.col_2 || row["Nama SKU"] || vals[1] || "";
                        if(!skuName || String(skuName).toUpperCase().includes("NAMA SKU") || String(skuName).includes("col_")) return;

                        skuCount++;
                        // PEMBULATAN MATEMATIS TANPA DESIMAL
                        const demandBulat = Math.round(Number(row.col_3 || row["Avg. Demand 3 Bulanan"] || vals[2] || 0));
                        const forecastBulat = Math.round(Number(row.col_4 || row["FORECAST PO"] || vals[3] || 0));
                        const bufferBulat = Math.round(Number(row.col_5 || row["BUFFER"] || vals[4] || 0));
                        const statusText = String(row.col_6 || row["STATUS"] || vals[5] || "");

                        const dot = statusText.includes("CRITICAL") ? '<span class="h-2.5 w-2.5 rounded-full bg-appred shadow-[0_0_8px_#FF3B30] inline-block animate-pulse"></span>' : '<span class="h-2.5 w-2.5 rounded-full bg-appgreen shadow-[0_0_8px_#34C759] inline-block"></span>';
                        
                        if(fCont) {
                            fCont.innerHTML += `
                                <div class="grid grid-cols-5 gap-1 items-center py-2.5 border-b border-white/5 text-[10px] text-center animate-fade-in-up" style="animation-delay: ${idx * 40}ms; opacity:0">
                                    <div class="font-black text-left text-white px-2 uppercase truncate min-w-0">${skuName}</div>
                                    <div class="text-gray-400 font-bold">${demandBulat}</div>
                                    <div class="text-white font-black">${forecastBulat}</div>
                                    <div class="text-white font-black">${bufferBulat}</div>
                                    <div class="flex justify-center items-center">${dot}</div>
                                </div>`;
                        }
                    });
                }
                runTicker(document.getElementById('stat-sku'), skuCount);

                // RENDER DIAGNOSE
                if(dCont) dCont.innerHTML = '';
                let dcIssueCount = 0;
                
                if(reqDiag.status === 'fulfilled' && reqDiag.value.ok) {
                    const textDiag = await reqDiag.value.text();
                    let rawDiag;
                    try { rawDiag = JSON.parse(textDiag); } catch(e) { rawDiag = []; }

                    const diagRows = Array.isArray(rawDiag) ? rawDiag : [rawDiag];

                    diagRows.forEach((item, idx) => {
                        const row = item.json ? item.json : item;
                        const vals = Object.values(row);
                        
                        let dcName = row["DC"] || row.col_2 || vals[1] || "";
                        if(!dcName || String(dcName).toUpperCase() === "DC" || String(dcName).includes("col_")) return;

                        const failCount = Number(row["WAREHOUSE FAILURE"] || row.col_3 || vals[2] || 0);
                        const moqCount = Number(row["UNDER MOQ"] || row.col_5 || vals[4] || 0);
                        const resStr = String(row["DIAGNOSE RESULTS (DR)"] || row.col_9 || vals[8] || "N/A").toUpperCase();

                        const total = failCount + moqCount;
                        if(total > 0 || dcName !== "N/A") dcIssueCount++;
                        
                        const failPct = total > 0 ? Math.round((failCount / total) * 100) : 0;
                        const moqPct = total > 0 ? Math.round((moqCount / total) * 100) : 0;

                        if(dCont) {
                            dCont.innerHTML += `
                                <div class="bg-appcard p-4 rounded-[2rem] border border-white/5 mb-3 animate-fade-in-up" style="animation-delay: ${idx * 40}ms; opacity:0">
                                    <div class="flex justify-between items-center mb-3">
                                        <h4 class="text-sm font-black text-white uppercase tracking-tight truncate w-32">${dcName}</h4>
                                        <p class="text-[8px] font-bold ${resStr.includes('FAILURE') ? 'text-appred' : 'text-apporange'} tracking-widest bg-black px-2 py-1 rounded-md border border-white/5">⚠️ ${resStr}</p>
                                    </div>
                                    <div class="grid grid-cols-3 gap-1 text-center bg-black/40 p-2.5 rounded-xl border border-white/5">
                                        <div class="border-r border-white/10"><p class="text-[7px] text-gray-500 font-bold uppercase tracking-widest mb-1">Failure</p><p class="text-xs font-black text-appred">${failPct}%</p></div>
                                        <div class="border-r border-white/10"><p class="text-[7px] text-gray-500 font-bold uppercase tracking-widest mb-1">Under MOQ</p><p class="text-xs font-black text-apporange">${moqPct}%</p></div>
                                        <div><p class="text-[7px] text-gray-500 font-bold uppercase tracking-widest mb-1">Above MOQ</p><p class="text-xs font-black text-appgreen">0%</p></div>
                                    </div>
                                </div>`;
                        }
                    });
                }
                runTicker(document.getElementById('stat-dc'), dcIssueCount);

            } catch (err) {
                showToast("Gagal Sync Data", true);
                console.error(err);
            } finally {
                if(btn) {
                    btn.innerHTML = origText;
                    btn.classList.remove('opacity-50', 'pointer-events-none');
                }
            }
        }

        // --- 2. LOG PO DATABASE ---
        async function loadLogPO() {
            const btn = document.getElementById('btn-sync-log');
            const cont = document.getElementById('log-container');
            const dl = document.getElementById('recent-po-ids'); 
            
            if(cont) cont.innerHTML = getSkeletonHTML(5, true);

            const res = await sendApi({ action: "load_admin" }, btn, `<i class="fa-solid fa-rotate-right"></i>`);
            if (res && res.status === "success") {
                activeLogData = res.data;
                
                // Isi Dropdown Rekomendasi 10 ID Terakhir
                if(dl) {
                    dl.innerHTML = '';
                    let countID = 0;
                    activeLogData.forEach(item => {
                        if(item.ID && countID < 10 && !String(item["PO NKA"]).includes("BATAL")) {
                            dl.innerHTML += `<option value="${item.ID}">`;
                            countID++;
                        }
                    });
                }
                renderLogs(activeLogData);
            }
        }

        function filterLogLocal() {
            const q = document.getElementById('search-po').value.toLowerCase();
            renderLogs(activeLogData.filter(i => (i.ID && i.ID.toLowerCase().includes(q)) || (i.DC && i.DC.toLowerCase().includes(q))));
        }

        function renderLogs(data) {
            const cont = document.getElementById('log-container');
            if(!cont) return;
            cont.innerHTML = '';
            data.forEach((item, idx) => {
                if(!item.ID || String(item["PO NKA"]).includes("BATAL")) return;
                
                const poQty = Number(item["TOTAL PO ctn"]) || 0;
                const salesQty = Number(item["Qty Terpenuhi (Kirim)"]) || 0;
                
                let borderCol = "border-white/5", textCol = "text-appred", icon = "fa-circle-xmark", iconCol="text-appred";
                if (salesQty >= (poQty * 0.85)) { 
                    borderCol = "border-appgreen/40"; textCol = "text-appgreen"; icon = "fa-circle-check"; iconCol="text-appgreen";
                } else if (salesQty > 0) { 
                    borderCol = "border-apporange/40"; textCol = "text-apporange"; icon = "fa-clock-rotate-left"; iconCol="text-apporange";
                }

                cont.innerHTML += `
                    <div class="bg-appcard rounded-3xl border ${borderCol} overflow-hidden transition-all duration-300 animate-fade-in-up" style="animation-delay: ${idx * 30}ms; opacity:0">
                        <div class="p-5 flex items-center justify-between cursor-pointer btn-tactile" onclick="toggleCard('${item.ID}')">
                            <div class="flex items-center gap-4 w-2/3">
                                <div class="w-10 h-10 rounded-2xl bg-black flex items-center justify-center border border-white/5 ${iconCol}"><i class="fa-solid ${icon} text-lg"></i></div>
                                <div class="min-w-0">
                                    <h4 class="font-black text-sm text-white uppercase tracking-tight truncate">${item.ID}</h4>
                                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1 truncate">${item.DC} • ${item["Tanggal PO"]}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] text-gray-600 uppercase font-black tracking-widest mb-0.5">PO / SALES</p>
                                <p class="text-sm font-black ${textCol} leading-none">${poQty} <span class="text-gray-600 mx-0.5">/</span> ${salesQty}</p>
                            </div>
                        </div>
                        
                        <div id="det-${item.ID}" class="accordion-content bg-black/50 p-5">
                            <div class="space-y-1.5 text-[10px] font-black uppercase text-white">
                                <div class="flex items-center justify-between bg-white/5 py-2 px-3 rounded-xl border border-white/5"><span class="w-12 text-gray-400">NKA</span><span class="flex-1 text-center text-gray-300">${item["PO NKA"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NKA"] || 0}</span></div>
                                <div class="flex items-center justify-between bg-white/5 py-2 px-3 rounded-xl border border-white/5"><span class="w-12 text-gray-400">NDLH</span><span class="flex-1 text-center text-gray-300">${item["PO NDLH"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NDLH"] || 0}</span></div>
                                <div class="flex items-center justify-between bg-white/5 py-2 px-3 rounded-xl border border-white/5"><span class="w-12 text-gray-400">NRD</span><span class="flex-1 text-center text-gray-300">${item["PO NRD"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NRD"] || 0}</span></div>
                                <div class="flex items-center justify-between bg-white/5 py-2 px-3 rounded-xl border border-white/5"><span class="w-12 text-gray-400">NARR</span><span class="flex-1 text-center text-gray-300">${item["PO NARR"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NARR"] || 0}</span></div>
                                <div class="flex items-center justify-between bg-white/5 py-2 px-3 rounded-xl border border-appblue/20"><span class="w-12 text-gray-400">NKACH</span><span class="flex-1 text-center text-gray-300">${item["PO NKACH"] || 0}</span><span class="flex-1 text-center text-appgreen">${item["NKACH"] || 0}</span></div>
                            </div>
                            <div class="flex justify-between items-center border-t border-white/5 pt-4 mt-3">
                                <div>
                                    <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mb-0.5">GAP Pengiriman</p>
                                    <p class="text-sm font-black ${item["GAP"] == 0 ? 'text-appgreen' : 'text-appred'}">${item["GAP"] || 0} CTN</p>
                                </div>
                                <button type="button" onclick="deletePO('${item.ID}')" class="bg-appred/10 text-appred border border-appred/30 font-bold text-[10px] py-2 px-4 rounded-xl btn-tactile hover:bg-appred hover:text-white transition-colors uppercase tracking-widest">
                                    <i class="fa-solid fa-trash mr-2"></i>BATAL
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }
        
        function toggleCard(id) { 
            const el = document.getElementById('det-' + id);
            if(el) el.classList.toggle('accordion-expanded'); 
        }

        async function deletePO(id) {
            if(!confirm(`PERINGATAN: Batalkan PO ${id}?`)) return;
            const res = await sendApi({ action: "delete", id: id });
            if(res && res.status === "success") { showToast(`PO Dibatalkan`); loadLogPO(); } 
            else showToast("Gagal membatalkan", true);
        }

        // --- 3. FORMS INPUT (DENGAN PROTEKSI TRY-CATCH) ---
        async function submitAction(e, act) {
            e.preventDefault();
            try {
                const btn = e.target.querySelector('button[type="submit"]');
                let payload = { action: act };
                const getVal = (id) => {
                    const el = document.getElementById(id);
                    return el ? el.value : "";
                };

                if(act === 'insert_po') {
                    payload = { ...payload, 
                        id: getVal('po-id').toUpperCase(),
                        tanggal_po: getVal('po-tanggal'),
                        tanggal_exp: getVal('po-exp'),
                        dc: getVal('po-dc').toUpperCase(),
                        po_nka: getVal('po-nka'),
                        po_ndlh: getVal('po-ndlh'),
                        po_nrd: getVal('po-nrd'),
                        po_narr: getVal('po-narr'),
                        po_nkach: getVal('po-nkach') 
                    };
                } 
                else if(act === 'insert_sales') {
                    payload = { ...payload, 
                        id: getVal('sls-id').toUpperCase(),
                        nka: getVal('sls-nka'),
                        ndlh: getVal('sls-ndlh'),
                        nrd: getVal('sls-nrd'),
                        narr: getVal('sls-narr'),
                        nkach: getVal('sls-nkach')
                    };
                }
                else if(act === 'insert_stock') {
                    payload = { ...payload, 
                        tanggal: getVal('stk-tanggal'),
                        nka: getVal('stk-nka'),
                        ndlh: getVal('stk-ndlh'),
                        nrd: getVal('stk-nrd'),
                        narr: getVal('stk-narr'),
                        nkach: getVal('stk-nkach')
                    };
                }

                const res = await sendApi(payload, btn, btn.innerText);
                if(res && res.status === "success") { 
                    showToast("Data Tersimpan!"); 
                    e.target.reset(); 
                } else {
                    showToast("Gagal menyimpan data", true);
                }
            } catch(error) {
                console.error(error);
                showToast("Kesalahan Internal Form", true);
            }
        }
    </script>
