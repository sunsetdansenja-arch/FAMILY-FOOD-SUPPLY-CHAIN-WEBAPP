<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFood SC Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appbg: '#0A0A0A',      
                        appcard: '#1C1C1E',    
                        apporange: '#FF851B',  
                        appblue: '#2B65F6',    
                        appgreen: '#34C759',   
                        appred: '#FF3B30'      
                    },
                    borderRadius: { '3xl': '1.25rem', '4xl': '2rem' },
                    boxShadow: { 'glow-orange': '0 0 20px rgba(255, 133, 27, 0.3)', 'glow-blue': '0 0 20px rgba(43, 101, 246, 0.3)' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0A0A0A; color: #fff; font-family: ui-sans-serif, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide { display: none !important; }
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        
        /* Tactile Inputs */
        input, select { background-color: #2C2C2E; border: 2px solid transparent; transition: all 0.2s; color: white; width: 100%; border-radius: 1rem; padding: 0.75rem 1rem; outline: none; font-weight: bold;}
        input:focus, select:focus { border-color: #FF851B; background-color: #1C1C1E; box-shadow: 0 0 15px rgba(255,133,27,0.2); }
        
        /* Animations */
        .btn-tactile { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-tactile:active { transform: scale(0.95); opacity: 0.9; }
        
        /* Accordion (Log PO) */
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; opacity: 0; }
        .accordion-expanded { max-height: 800px; opacity: 1; border-top: 1px solid rgba(255,255,255,0.1); }
        
        /* Toast Notification */
        #toast { transform: translateY(-150%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast-show { transform: translateY(0) !important; }

        /* Status Glows */
        .glow-crit { box-shadow: 0 0 20px rgba(255, 59, 48, 0.15); border: 1px solid rgba(255, 59, 48, 0.4); }
        .glow-safe { border: 1px solid rgba(52, 199, 89, 0.2); }
    </style>
</head>
<body class="flex justify-center antialiased">

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] bg-appcard border-2 border-apporange text-white px-6 py-3 rounded-full shadow-glow-orange font-bold text-sm flex items-center gap-3 w-max max-w-[90%] pointer-events-none">
        <span id="toast-icon">✅</span>
        <span id="toast-msg">Success</span>
    </div>

    <div id="modal-dc" class="fixed inset-0 bg-black/95 backdrop-blur-sm z-[100] hide flex flex-col px-4 pt-12 pb-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-white font-black text-xl italic tracking-tight text-apporange">PILIH NAMA DC</h3>
            <button onclick="closeDCModal()" class="text-gray-400 bg-white/10 p-2 rounded-full btn-tactile hover:text-white">✕</button>
        </div>
        <div class="grid grid-cols-3 gap-3 overflow-y-auto pb-10 content-start flex-1" id="dc-grid">
            </div>
    </div>

    <div id="app" class="w-full max-w-md bg-appbg min-h-screen relative overflow-x-hidden flex flex-col shadow-2xl">
        
        <div id="view-login" class="flex flex-col h-screen p-8 justify-center items-center relative z-40 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#1C1C1E] via-[#0A0A0A] to-[#0A0A0A]">
            <div class="w-full max-w-sm space-y-8 bg-appcard p-8 rounded-[2.5rem] border border-white/5 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-apporange"></div>
                <div class="text-center space-y-1">
                    <h1 class="text-4xl font-black text-white tracking-tighter italic">FAMILY<span class="text-appblue">FOOD</span></h1>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Analytic & Control Center</p>
                </div>
                <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
                    <div><input type="text" id="login-user" placeholder="USER ID" required class="text-center font-black uppercase tracking-widest"></div>
                    <div><input type="password" id="login-pass" placeholder="PASSWORD" required class="text-center font-black tracking-widest"></div>
                    <button type="submit" id="btn-login" class="w-full bg-apporange text-black font-black py-4 rounded-2xl btn-tactile shadow-glow-orange mt-2 uppercase tracking-widest">LOGIN SISTEM</button>
                </form>
            </div>
        </div>

        <div id="view-main" class="hide flex-col h-full">
            
            <div class="px-6 py-4 sticky top-0 bg-[#0A0A0A]/90 backdrop-blur-xl z-20 flex justify-between items-center border-b border-white/5">
                <div>
                    <h2 class="text-xl font-black text-white tracking-tighter italic leading-none">FAMILY<span class="text-apporange">FOOD</span></h2>
                    <div class="flex items-center gap-1.5 mt-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-appgreen animate-pulse"></span>
                        <p id="header-username" class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">USER LOGGED IN</p>
                    </div>
                </div>
                <button onclick="logout()" class="bg-white/5 px-3 py-2 rounded-xl text-gray-400 btn-tactile border border-white/5 text-[10px] font-bold uppercase">Logout</button>
            </div>

            <div class="flex-1 overflow-y-auto pb-32">
                
                <div id="tab-analytics" class="p-6 space-y-10">
                    <button onclick="loadAnalytics()" id="btn-sync-analytics" class="w-full bg-white text-black font-black py-4 rounded-2xl btn-tactile shadow-[0_0_20px_rgba(255,255,255,0.2)] flex justify-center items-center gap-2 text-sm uppercase tracking-widest">
                        <span>🔄</span> SYNC ANALYTIC DATA
                    </button>

                    <div class="space-y-4">
                        <div class="flex justify-between items-end border-b border-white/10 pb-2">
                            <h4 class="text-xs font-black text-apporange uppercase tracking-[0.2em]">Inventory Health</h4>
                            <span id="stat-sku" class="text-[10px] text-gray-400 font-bold bg-white/10 px-2 py-0.5 rounded">0 SKU</span>
                        </div>
                        <div id="forecast-container" class="space-y-4">
                            <p class="text-center text-gray-600 text-xs py-10 italic">Data belum disinkronisasi.</p>
                        </div>
                    </div>

                    <div class="space-y-4 pt-4">
                        <div class="flex justify-between items-end border-b border-white/10 pb-2">
                            <h4 class="text-xs font-black text-appblue uppercase tracking-[0.2em]">DC Diagnose</h4>
                            <span id="stat-dc" class="text-[10px] text-gray-400 font-bold bg-white/10 px-2 py-0.5 rounded">0 DC</span>
                        </div>
                        <div id="diagnosa-container" class="space-y-3">
                            </div>
                    </div>
                </div>

                <div id="tab-log" class="hide p-6 space-y-6">
                    <div class="sticky top-[68px] bg-[#0A0A0A]/95 backdrop-blur-xl z-10 pt-2 pb-4 border-b border-white/5">
                        <button onclick="loadLogPO()" id="btn-sync-log" class="w-full bg-appblue text-white font-black py-4 rounded-2xl btn-tactile shadow-glow-blue flex justify-center items-center gap-2 uppercase tracking-widest text-sm mb-4">
                            Tarik Log Database
                        </button>
                        <input type="text" id="search-po" placeholder="Cari ID PO atau DC..." class="text-sm bg-appcard border border-white/10" onkeyup="filterLogLocal()">
                    </div>
                    <div id="log-container" class="space-y-3"></div>
                </div>

                <div id="tab-forms" class="hide p-6 space-y-6">
                    <div class="flex bg-appcard p-1.5 rounded-2xl border border-white/5 relative shadow-xl">
                        <button onclick="switchForm('po')" id="btn-form-po" class="flex-1 py-2.5 rounded-xl text-xs font-black uppercase transition-all bg-apporange text-black">New PO</button>
                        <button onclick="switchForm('sales')" id="btn-form-sales" class="flex-1 py-2.5 rounded-xl text-xs font-black uppercase transition-all text-gray-500">Sales</button>
                        <button onclick="switchForm('stock')" id="btn-form-stock" class="flex-1 py-2.5 rounded-xl text-xs font-black uppercase transition-all text-gray-500">Stock</button>
                    </div>

                    <form id="form-po" onsubmit="submitAction(event, 'insert_po')" class="space-y-5 bg-appcard p-5 rounded-3xl border border-white/5">
                        <div class="space-y-3">
                            <input type="text" id="po-id" placeholder="ID PO (CTH: JKT01...)" required class="uppercase">
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" id="po-tanggal" placeholder="Tgl PO (DD/MM/YYYY)" required>
                                <input type="text" id="po-exp" placeholder="Tgl EXP (DD/MM/YYYY)" required>
                            </div>
                            <div class="relative cursor-pointer btn-tactile" onclick="openDCModal('po-dc')">
                                <input type="text" id="po-dc" placeholder="PILIH DC" required readonly class="pointer-events-none uppercase bg-appblue/10 border-appblue/30 text-appblue">
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-appblue">🔍</div>
                            </div>
                        </div>
                        <div class="pt-4 border-t border-white/5">
                            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-3">Kuantitas PO SKU (Ctn)</p>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NKA</label><input type="number" id="po-nka" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NDLH</label><input type="number" id="po-ndlh" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NRD</label><input type="number" id="po-nrd" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NARR</label><input type="number" id="po-narr" value="0" required class="bg-transparent border-none mt-1"></div>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-apporange text-black font-black py-4 rounded-2xl btn-tactile shadow-glow-orange tracking-widest">SUBMIT PO</button>
                    </form>

                    <form id="form-sales" onsubmit="submitAction(event, 'insert_sales')" class="hide space-y-5 bg-appcard p-5 rounded-3xl border border-white/5">
                        <div class="space-y-3">
                            <input type="text" id="sls-id" placeholder="ID PO" required class="uppercase">
                             <div class="relative cursor-pointer btn-tactile" onclick="openDCModal('sls-dc')">
                                <input type="text" id="sls-dc" placeholder="PILIH DC (OPSIONAL)" readonly class="pointer-events-none uppercase bg-appblue/10 border-appblue/30 text-appblue">
                                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-appblue">🔍</div>
                            </div>
                        </div>
                        <div class="pt-4 border-t border-white/5">
                            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-3">Realisasi / Sales (Ctn)</p>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NKA</label><input type="number" id="sls-nka" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NDLH</label><input type="number" id="sls-ndlh" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NRD</label><input type="number" id="sls-nrd" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NARR</label><input type="number" id="sls-narr" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="col-span-2 bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NKACH</label><input type="number" id="sls-nkach" value="0" required class="bg-transparent border-none mt-1"></div>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-appblue text-white font-black py-4 rounded-2xl btn-tactile shadow-glow-blue tracking-widest">UPDATE SALES</button>
                    </form>

                    <form id="form-stock" onsubmit="submitAction(event, 'insert_stock')" class="hide space-y-5 bg-appcard p-5 rounded-3xl border border-white/5">
                        <input type="text" id="stk-tanggal" placeholder="Tanggal (DD/MM/YYYY)" required>
                        <div class="pt-2 border-t border-white/5">
                            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-3 mt-2">Update Fisik Stock (Ctn)</p>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NKA</label><input type="number" id="stk-nka" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NDLH</label><input type="number" id="stk-ndlh" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NRD</label><input type="number" id="stk-nrd" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NARR</label><input type="number" id="stk-narr" value="0" required class="bg-transparent border-none mt-1"></div>
                                <div class="col-span-2 bg-black/30 p-2 rounded-2xl"><label class="text-[9px] text-gray-500 ml-2 font-bold">NKACH</label><input type="number" id="stk-nkach" value="0" required class="bg-transparent border-none mt-1"></div>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-appgreen text-black font-black py-4 rounded-2xl btn-tactile tracking-widest" style="box-shadow: 0 0 20px rgba(52, 199, 89, 0.2);">UPDATE STOCK</button>
                    </form>
                </div>
            </div>

            <div class="fixed bottom-0 w-full max-w-md bg-[#0A0A0A]/95 backdrop-blur-xl border-t border-white/5 pt-3 pb-6 px-6 flex justify-between items-center z-50 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                <button onclick="switchMainTab('tab-analytics', this)" class="nav-item flex-1 flex flex-col items-center gap-1.5 text-apporange transition-colors btn-tactile">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <span class="text-[9px] font-black uppercase tracking-widest">Analytic</span>
                </button>
                
                <div class="relative -top-7">
                    <button onclick="switchMainTab('tab-forms', this)" class="nav-item bg-white text-black h-16 w-16 rounded-full flex justify-center items-center shadow-[0_0_20px_rgba(255,255,255,0.3)] btn-tactile border-[6px] border-[#0A0A0A]">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                    </button>
                </div>

                <button onclick="switchMainTab('tab-log', this)" class="nav-item flex-1 flex flex-col items-center gap-1.5 text-gray-600 transition-colors btn-tactile">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                    <span class="text-[9px] font-black uppercase tracking-widest">Database</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/ff-indonesia-api";
        let activeLogData = [];
        let targetDCInput = "";

        // DATA DC STATIS (Untuk Modal Grid)
        const DC_LIST = [
            "BANDUNG", "BALARAJA", "BEKASI", "BOGOR", "BREBEK", "CIANJUR", 
            "CILEUNGSI", "CIKOKOL", "CILACAP", "JEMBER", "KARAWANG", "KLATEN", 
            "MADIUN", "MALANG", "PARUNG", "PLUMBON", "REMBANG", "SEMARANG", 
            "SERANG", "SIDOARJO", "TEGAL", "BALI", "BANJARMASIN", "BATAM", 
            "GORONTALO", "JAMBI", "SUKABUMI", "LAMPUNG", "LOMBOK", "LUWU", 
            "MAKASSAR", "MANADO", "MEDAN", "PALEMBANG", "PEKANBARU", "PONTIANAK"
        ];

        // --- UTILITIES ---
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = isError ? '❌' : '✅';
            t.className = `fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full font-black text-sm flex items-center gap-3 w-max max-w-[90%] transition-transform duration-300 border-2 ${isError ? 'bg-[#3A0000] border-appred text-appred shadow-[0_0_20px_rgba(255,59,48,0.4)]' : 'bg-appcard border-appblue text-white shadow-glow-blue'}`;
            t.classList.add('toast-show');
            setTimeout(() => t.classList.remove('toast-show'), 3000);
        }

        async function sendApi(payload, btnElement = null, originalText = "") {
            if(btnElement) { btnElement.innerHTML = `<span class="animate-spin">⏳</span>`; btnElement.classList.add('opacity-50', 'pointer-events-none'); }
            try {
                const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                if(btnElement) { btnElement.innerHTML = originalText; btnElement.classList.remove('opacity-50', 'pointer-events-none'); }
                return Array.isArray(data) ? data[0] : data;
            } catch (e) {
                if(btnElement) { btnElement.innerHTML = originalText; btnElement.classList.remove('opacity-50', 'pointer-events-none'); }
                showToast("Koneksi Server Error", true);
                return null;
            }
        }

        // --- DC MODAL PICKER ---
        function initDCPicker() {
            const grid = document.getElementById('dc-grid');
            DC_LIST.forEach(dc => {
                grid.innerHTML += `<button onclick="selectDC('${dc}')" class="bg-appcard border border-white/10 text-white text-[10px] font-bold py-3 rounded-2xl btn-tactile hover:border-apporange hover:text-apporange transition-colors uppercase tracking-wider">${dc}</button>`;
            });
        }
        function openDCModal(inputId) {
            targetDCInput = inputId;
            document.getElementById('modal-dc').classList.remove('hide');
        }
        function closeDCModal() {
            document.getElementById('modal-dc').classList.add('hide');
        }
        function selectDC(dcName) {
            document.getElementById(targetDCInput).value = dcName;
            closeDCModal();
        }

        // --- NAVIGATION ---
        function switchMainTab(tabId, element) {
            ['tab-analytics', 'tab-log', 'tab-forms'].forEach(id => document.getElementById(id).classList.add('hide'));
            document.getElementById(tabId).classList.remove('hide');
            
            document.querySelectorAll('.nav-item').forEach(el => {
                if(el.classList.contains('w-16')) return; // skip FAB
                el.classList.replace('text-apporange', 'text-gray-600');
                el.classList.replace('text-appblue', 'text-gray-600');
            });
            if(element && !element.classList.contains('w-16')) {
                element.classList.replace('text-gray-600', tabId === 'tab-analytics' ? 'text-apporange' : 'text-appblue');
            }
        }

        function switchForm(formType) {
            ['form-po', 'form-sales', 'form-stock'].forEach(id => document.getElementById(id).classList.add('hide'));
            document.getElementById('form-' + formType).classList.remove('hide');
            
            ['btn-form-po', 'btn-form-sales', 'btn-form-stock'].forEach(id => {
                document.getElementById(id).className = "flex-1 py-2.5 rounded-xl text-xs font-black uppercase transition-all text-gray-500 bg-transparent"; 
            });
            
            const activeBtn = document.getElementById('btn-form-' + formType);
            if(formType === 'po') activeBtn.className = "flex-1 py-2.5 rounded-xl text-xs font-black uppercase transition-all bg-apporange text-black";
            if(formType === 'sales') activeBtn.className = "flex-1 py-2.5 rounded-xl text-xs font-black uppercase transition-all bg-appblue text-white shadow-glow-blue";
            if(formType === 'stock') activeBtn.className = "flex-1 py-2.5 rounded-xl text-xs font-black uppercase transition-all bg-appgreen text-black" + ' shadow-[0_0_15px_rgba(52,199,89,0.3)]';
        }

        // --- LOGIN ---
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            
            const res = await sendApi({ action: "login", user_id: user, password: pass }, btn, "LOGIN SISTEM");
            if (res && res.status === "success") {
                showToast("Akses Diberikan!");
                document.getElementById('view-login').classList.add('hide');
                document.getElementById('view-main').classList.remove('hide');
                document.getElementById('header-username').innerText = res.user_id || user;
                initDCPicker();
                loadAnalytics(); 
            } else {
                showToast(res ? res.message : "Akses Ditolak", true);
            }
        }

        function logout() {
            document.getElementById('view-main').classList.add('hide');
            document.getElementById('view-login').classList.remove('hide');
            document.getElementById('login-pass').value = '';
        }

        // --- 1. ANALYTICS VIEW ---
        async function loadAnalytics() {
            const btn = document.getElementById('btn-sync-analytics');
            const res = await sendApi({ action: "load_owner" }, btn, "<span>🔄</span> SYNC ANALYTIC DATA");
            
            if (res && res.status === "success" && res.data) {
                // INVENTORY HEALTH
                const fCont = document.getElementById('forecast-container');
                fCont.innerHTML = '';
                res.data.forecast.forEach(item => {
                    const isCrit = String(item.status).includes("CRITICAL");
                    fCont.innerHTML += `
                        <div class="bg-appcard p-5 rounded-[2rem] ${isCrit ? 'glow-crit' : 'glow-safe'} transition-all">
                            <div class="flex justify-between items-center mb-4">
                                <div>
                                    <h3 class="text-xl font-black text-white italic tracking-tight">${item.sku_name}</h3>
                                    <span class="text-[9px] font-black uppercase ${isCrit ? 'text-appred' : 'text-appgreen'} tracking-widest">${item.status}</span>
                                </div>
                                <div class="text-right">
                                    <p class="text-[8px] text-gray-500 uppercase font-bold tracking-widest">Forecast PO</p>
                                    <p class="text-2xl font-black text-white leading-none">${item.forecast_po}</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 mb-4 text-[10px]">
                                <div class="bg-black/30 px-3 py-2 rounded-xl border border-white/5"><span class="text-gray-500 font-bold uppercase">Demand</span> <span class="text-white font-black float-right">${item.avg_demand}</span></div>
                                <div class="bg-black/30 px-3 py-2 rounded-xl border border-white/5"><span class="text-gray-500 font-bold uppercase">Buffer</span> <span class="text-white font-black float-right">${item.buffer}</span></div>
                            </div>
                            <div class="flex justify-between items-center text-[10px] font-bold uppercase tracking-widest bg-black/50 py-2 px-4 rounded-xl">
                                <span class="${isCrit ? 'text-appred' : 'text-gray-400'}">${isCrit ? 'UNDER STOCK' : 'OVER STOCK'}</span>
                                <span class="text-white font-black">${isCrit ? item.under_stock : item.over_stock} CTN</span>
                            </div>
                        </div>`;
                });
                document.getElementById('stat-sku').innerText = res.total_sku + " SKU";

                // DC DIAGNOSE (EXPLICIT PERCENTAGE)
                const dCont = document.getElementById('diagnosa-container');
                dCont.innerHTML = '';
                
                let diagData = res.data.diagnosa.sort((a,b) => {
                    return (Number(b.warehouse_failure) + Number(b.under_moq)) - (Number(a.warehouse_failure) + Number(a.under_moq)); 
                });

                diagData.forEach(item => {
                    const failCount = Number(item.warehouse_failure);
                    const moqCount = Number(item.under_moq);
                    const total = failCount + moqCount;
                    
                    const failPct = total > 0 ? Math.round((failCount / total) * 100) : 0;
                    const moqPct = total > 0 ? Math.round((moqCount / total) * 100) : 0;
                    const isFail = failPct > moqPct; // Cek dominasi
                    const resStr = String(item.diagnose_result || "").toUpperCase();

                    dCont.innerHTML += `
                        <div class="bg-appcard p-5 rounded-[2rem] border border-white/5 mb-3">
                            <div class="flex justify-between items-center mb-3">
                                <div>
                                    <h4 class="text-sm font-black text-white uppercase tracking-tight">${item.dc_name}</h4>
                                    <p class="text-[9px] font-bold mt-0.5 ${resStr.includes('FAILURE') ? 'text-appred' : 'text-apporange'} tracking-widest">⚠️ ${resStr}</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-3 gap-2 text-center bg-black/40 p-3 rounded-2xl border border-white/5">
                                <div>
                                    <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mb-1">WH Failure</p>
                                    <p class="text-sm font-black text-appred">${failPct}%</p>
                                </div>
                                <div class="border-l border-r border-white/10">
                                    <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mb-1">Under MOQ</p>
                                    <p class="text-sm font-black text-apporange">${moqPct}%</p>
                                </div>
                                <div>
                                    <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mb-1">Above MOQ</p>
                                    <p class="text-sm font-black text-appgreen">0%</p>
                                </div>
                            </div>
                        </div>`;
                });
                document.getElementById('stat-dc').innerText = diagData.length + " DC";
            }
        }

        // --- 2. LOG PO (DATABASE) ---
        async function loadLogPO() {
            const btn = document.getElementById('btn-sync-log');
            const res = await sendApi({ action: "load_admin" }, btn, "TARIK LOG DATABASE");
            if (res && res.status === "success") {
                activeLogData = res.data;
                renderLogs(activeLogData);
            }
        }

        function filterLogLocal() {
            const q = document.getElementById('search-po').value.toLowerCase();
            const filtered = activeLogData.filter(i => (i.ID && i.ID.toLowerCase().includes(q)) || (i.DC && i.DC.toLowerCase().includes(q)));
            renderLogs(filtered);
        }

        function renderLogs(data) {
            const cont = document.getElementById('log-container');
            cont.innerHTML = '';
            data.forEach(item => {
                if(!item.ID || String(item["PO NKA"]).includes("BATAL")) return;
                
                // HTML Expandable Card (PO vs Sales)
                cont.innerHTML += `
                    <div class="bg-appcard rounded-3xl border border-white/5 overflow-hidden transition-all duration-300">
                        <div class="p-5 flex items-center justify-between cursor-pointer btn-tactile" onclick="toggleCard('${item.ID}')">
                            <div>
                                <h4 class="font-black text-sm text-appblue uppercase tracking-tight">${item.ID}</h4>
                                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">${item.DC} • ${item["Tanggal PO"]}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Total Qty</p>
                                <p class="text-lg font-black text-white leading-none">${item["TOTAL PO ctn"]} <span class="text-[9px]">CTN</span></p>
                            </div>
                        </div>
                        
                        <div id="det-${item.ID}" class="accordion-content bg-black/50">
                            <div class="p-5 space-y-3">
                                <div class="flex text-[9px] text-gray-500 font-bold uppercase tracking-widest px-2 mb-1">
                                    <span class="w-12">SKU</span>
                                    <span class="flex-1 text-center">PO</span>
                                    <span class="flex-1 text-center">Sales</span>
                                </div>
                                <div class="space-y-2 text-[10px] font-black uppercase text-white">
                                    <div class="flex items-center bg-white/5 py-2 px-3 rounded-xl border border-white/5"><span class="w-12 text-gray-400">NKA</span><span class="flex-1 text-center text-apporange">${item["PO NKA"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NKA"] || 0}</span></div>
                                    <div class="flex items-center bg-white/5 py-2 px-3 rounded-xl border border-white/5"><span class="w-12 text-gray-400">NDLH</span><span class="flex-1 text-center text-apporange">${item["PO NDLH"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NDLH"] || 0}</span></div>
                                    <div class="flex items-center bg-white/5 py-2 px-3 rounded-xl border border-white/5"><span class="w-12 text-gray-400">NRD</span><span class="flex-1 text-center text-apporange">${item["PO NRD"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NRD"] || 0}</span></div>
                                    <div class="flex items-center bg-white/5 py-2 px-3 rounded-xl border border-white/5"><span class="w-12 text-gray-400">NARR</span><span class="flex-1 text-center text-apporange">${item["PO NARR"] || 0}</span><span class="flex-1 text-center text-appblue">${item["NARR"] || 0}</span></div>
                                </div>
                                <div class="flex justify-between items-center border-t border-white/10 pt-4 mt-2">
                                    <div>
                                        <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">GAP Pengiriman</p>
                                        <p class="text-base font-black ${item["GAP"] == 0 ? 'text-appgreen' : 'text-appred'}">${item["GAP"] || 0} CTN</p>
                                    </div>
                                    <button onclick="deletePO('${item.ID}')" class="bg-appred/10 text-appred border border-appred/30 font-bold text-xs py-2.5 px-5 rounded-xl btn-tactile hover:bg-appred hover:text-white transition-colors uppercase tracking-widest">
                                        Batal PO
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function toggleCard(id) {
            const el = document.getElementById('det-' + id);
            el.classList.toggle('accordion-expanded');
        }

        async function deletePO(id) {
            if(!confirm(`PERINGATAN: Batalkan PO ${id}?`)) return;
            const res = await sendApi({ action: "delete", id: id });
            if(res && res.status === "success") {
                showToast(`PO ${id} Dibatalkan`);
                loadLogPO();
            } else showToast("Gagal membatalkan PO", true);
        }

        // --- 3. FORMS INPUT ---
        async function submitAction(e, actionType) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            let payload = { action: actionType };

            if(actionType === 'insert_po') {
                payload = { ...payload, 
                    id: document.getElementById('po-id').value.toUpperCase(),
                    tanggal_po: document.getElementById('po-tanggal').value,
                    tanggal_exp: document.getElementById('po-exp').value,
                    dc: document.getElementById('po-dc').value.toUpperCase(),
                    po_nka: document.getElementById('po-nka').value,
                    po_ndlh: document.getElementById('po-ndlh').value,
                    po_nrd: document.getElementById('po-nrd').value,
                    po_narr: document.getElementById('po-narr').value,
                    po_nkach: "0" 
                };
            } 
            else if(actionType === 'insert_sales') {
                payload = { ...payload, 
                    id: document.getElementById('sls-id').value.toUpperCase(),
                    // Opsional DC jika n8n butuh dikirim, biarkan saja
                    dc: document.getElementById('sls-dc').value.toUpperCase(), 
                    nka: document.getElementById('sls-nka').value,
                    ndlh: document.getElementById('sls-ndlh').value,
                    nrd: document.getElementById('sls-nrd').value,
                    narr: document.getElementById('sls-narr').value,
                    nkach: document.getElementById('sls-nkach').value
                };
            }
            else if(actionType === 'insert_stock') {
                payload = { ...payload, 
                    tanggal: document.getElementById('stk-tanggal').value,
                    nka: document.getElementById('stk-nka').value,
                    ndlh: document.getElementById('stk-ndlh').value,
                    nrd: document.getElementById('stk-nrd').value,
                    narr: document.getElementById('stk-narr').value,
                    nkach: document.getElementById('stk-nkach').value
                };
            }

            const res = await sendApi(payload, btn, btn.innerHTML);
            if(res && res.status === "success") {
                showToast(res.message || "Data Tersimpan!");
                e.target.reset();
            } else {
                showToast("Gagal menyimpan data", true);
            }
        }
    </script>
</body>
</html>
